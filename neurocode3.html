<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neuro-Trainer Pro v3 (Levels)</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; overflow: hidden; user-select: none; height: 100vh; }
        .app-container { display: flex; flex-direction: column; align-items: center; height: 100%; padding: 10px; box-sizing: border-box; }
        h1 { text-shadow: 0 0 10px #0f0; margin: 10px 0; font-size: 1.5rem; flex-shrink: 0; }
        .stats { font-size: 1.2rem; color: #fff; margin-bottom: 10px; min-height: 30px; flex-shrink: 0; }
        .game-area { width: 100%; flex-grow: 1; border: 2px solid #333; background: #050505; position: relative; border-radius: 10px; box-shadow: 0 0 20px #003300; overflow: hidden; touch-action: none; }
        .controls-container { display: flex; flex-wrap: wrap; justify-content: center; margin-top: 10px; flex-shrink: 0; width: 100%; padding-bottom: 10px; }
        
        /* التعديل: الأهداف */
        .target {
            position: absolute; width: 60px; height: 60px;
            background: #0f0; color: #000; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.8rem; font-weight: bold;
            box-shadow: 0 0 15px #0f0; cursor: pointer;
            transform: translate(-50%, -50%);
            z-index: 10;
        }
        .target.hit { background: #333; color: #555; box-shadow: none; border: 1px solid #555; pointer-events: none; }

        .btn { background: #111; color: #0f0; border: 1px solid #0f0; padding: 12px 25px; font-size: 1.1rem; margin: 5px; cursor: pointer; transition: 0.2s; font-family: inherit; }
        .btn:active { background: #0f0; color: #000; }
        
        /* Memory Game Styles (Old) */
        .memory-item { position: absolute; font-size: 2.5rem; font-weight: bold; color: #0f0; transform: translate(-50%, -50%); }
        .input-box { position: absolute; transform: translate(-50%, -50%); width: 60px; height: 40px; background: #222; border: 1px solid #0f0; color: #fff; text-align: center; font-size: 1.5rem; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // اللعبة 1: قناص المستويات (Levels Sniper)
        // ==========================================
        const ReflexGame = ({ goBack }) => {
            const [level, setLevel] = useState(1);
            const [gameState, setGameState] = useState('idle'); // idle, waiting, visible, win, game-over
            const [targets, setTargets] = useState([]);
            const [msg, setMsg] = useState("المستوى 1: هدف واحد");
            const timerRef = useRef(null);

            // تنظيف التايمر عند الخروج
            useEffect(() => {
                return () => clearTimeout(timerRef.current);
            }, []);

            const startLevel = () => {
                clearTimeout(timerRef.current);
                setGameState('waiting');
                setMsg(`استعد للمستوى ${level}...`);
                
                const delay = Math.floor(Math.random() * 2000) + 1000;

                setTimeout(() => {
                    generateTargets(level);
                    setGameState('visible');
                    
                    // حساب الوقت المسموح: 1000ms لأول هدف + 500ms لكل هدف إضافي
                    // المستوى 1 = 1000ms
                    // المستوى 2 = 1500ms
                    // المستوى 3 = 2000ms
                    const timeLimit = 1000 + ((level - 1) * 600); 

                    // بدء مؤقت الخسارة
                    timerRef.current = setTimeout(() => {
                        handleGameOver();
                    }, timeLimit);

                }, delay);
            };

            const generateTargets = (lvl) => {
                const newTargets = [];
                for (let i = 0; i < lvl; i++) {
                    // محاولة منع تداخل الأرقام (Simple collision avoidance)
                    let top, left, overlapping;
                    let attempts = 0;
                    do {
                        top = Math.floor(Math.random() * 80) + 10;
                        left = Math.floor(Math.random() * 80) + 10;
                        overlapping = newTargets.some(t => Math.abs(t.top - top) < 15 && Math.abs(t.left - left) < 15);
                        attempts++;
                    } while (overlapping && attempts < 20);

                    newTargets.push({
                        id: i,
                        val: Math.floor(Math.random() * 9) + 1,
                        top: `${top}%`,
                        left: `${left}%`,
                        hit: false
                    });
                }
                setTargets(newTargets);
            };

            const handleHit = (id) => {
                if (gameState !== 'visible') return;

                // تحديث الهدف ليصبح "مضروب"
                const updatedTargets = targets.map(t => t.id === id ? { ...t, hit: true } : t);
                setTargets(updatedTargets);

                // فحص الفوز: هل كل الأهداف مضروبة؟
                const allHit = updatedTargets.every(t => t.hit);

                if (allHit) {
                    clearTimeout(timerRef.current); // إيقاف مؤقت الخسارة فوراً
                    setGameState('win');
                    setMsg(`⚡ ممتاز! المستوى ${level} اكتمل.`);
                }
            };

            const handleGameOver = () => {
                setGameState('game-over');
                setMsg("❌ فاتك الوقت! عد للمستوى 1");
                setLevel(1); // عقاب: العودة للبداية
            };

            const nextLevel = () => {
                setLevel(level + 1);
                startLevel(); // ابدأ المستوى التالي مباشرة؟ أو انتظر ضغط الزر
                // سنجعلها تنتظر ضغطة زر "المستوى التالي" للراحة النفسية
                setGameState('idle-next'); 
                setMsg(`جاهز للمستوى ${level + 1}؟`);
            };

            return (
                <div className="app-container">
                    <h1>قناص النورأدرينالين (Lv.{level})</h1>
                    <div className="stats" style={{color: gameState === 'game-over' ? 'red' : '#fff'}}>{msg}</div>
                    
                    <div className="game-area">
                        {/* عرض الأهداف */}
                        {gameState === 'visible' && targets.map(t => (
                            <div key={t.id} 
                                 className={`target ${t.hit ? 'hit' : ''}`}
                                 style={{ top: t.top, left: t.left }}
                                 onMouseDown={(e) => { e.stopPropagation(); handleHit(t.id); }}
                                 onTouchStart={(e) => { e.stopPropagation(); handleHit(t.id); }}
                            >
                                {t.val}
                            </div>
                        ))}
                    </div>

                    <div className="controls-container">
                        {/* أزرار التحكم حسب الحالة */}
                        
                        {(gameState === 'idle') && 
                            <button className="btn" onClick={startLevel}>ابدأ التحدي</button>
                        }

                        {(gameState === 'win') && 
                            <button className="btn" onClick={() => { setLevel(l => l + 1); setTimeout(startLevel, 100); }}>المستوى التالي ({level+1}) ⏩</button>
                        }

                        {(gameState === 'game-over') && 
                            <button className="btn" style={{borderColor:'red', color:'red'}} onClick={() => { setLevel(1); setTimeout(startLevel, 100); }}>إعادة من الصفر 💀</button>
                        }

                        <button className="btn" style={{borderColor: '#555'}} onClick={goBack}>خروج</button>
                    </div>
                </div>
            );
        };

        // ==========================================
        // اللعبة 2: ذاكرة الدوبامين (نفس الكود السابق)
        // ==========================================
        const MemoryGame = ({ goBack }) => {
            const [phase, setPhase] = useState('idle');
            const [items, setItems] = useState([]);
            const [inputs, setInputs] = useState({});
            const [timer, setTimer] = useState(0);

            const startMem = () => {
                const newItems = [];
                for(let i=0; i<5; i++) {
                    newItems.push({
                        id: i,
                        val: Math.floor(Math.random() * 90) + 10,
                        top: Math.floor(Math.random() * 80) + 10,
                        left: Math.floor(Math.random() * 80) + 10
                    });
                }
                setItems(newItems);
                setInputs({});
                setPhase('memorize');
                setTimeout(() => {
                    setPhase('maintenance');
                    setTimer(10);
                }, 3000);
            };

            useEffect(() => {
                if (phase === 'maintenance') {
                    if (timer > 0) {
                        const t = setTimeout(() => setTimer(timer - 1), 1000);
                        return () => clearTimeout(t);
                    } else {
                        setPhase('recall');
                    }
                }
            }, [phase, timer]);

            const checkAnswers = () => setPhase('result');

            return (
                <div className="app-container">
                    <h1>ذاكرة الدوبامين (تثبيت)</h1>
                    <div className="game-area">
                        {phase === 'idle' && (
                            <div className="overlay">
                                <p style={{color:'#aaa', textAlign:'center'}}>صور 5 أرقام، ثبتها في الظلام، ثم أعد كتابتها.</p>
                                <button className="btn" onClick={startMem}>بدء</button>
                            </div>
                        )}
                        {phase === 'maintenance' && (
                            <div className="overlay">
                                <h2 style={{color: '#0ff'}}>مرحلة التثبيت</h2>
                                <h1 style={{fontSize: '5rem', color: '#fff'}}>{timer}</h1>
                                <p>حافظ على الصورة في خيالك!</p>
                            </div>
                        )}
                        {phase === 'memorize' && items.map(item => (
                            <div key={item.id} className="memory-item" style={{top: `${item.top}%`, left: `${item.left}%`}}>{item.val}</div>
                        ))}
                        {phase === 'recall' && items.map(item => (
                            <div key={item.id} style={{position:'absolute', top: `${item.top}%`, left: `${item.left}%`, transform: 'translate(-50%, -50%)'}}>
                                <input type="number" className="input-box" onChange={(e) => setInputs({...inputs, [item.id]: e.target.value})} />
                            </div>
                        ))}
                        {phase === 'result' && items.map(item => (
                            <div key={item.id} className="memory-item" style={{top: `${item.top}%`, left: `${item.left}%`, color: inputs[item.id] == item.val ? '#0f0' : '#f00', border: inputs[item.id] == item.val ? '2px solid #0f0' : '2px solid #f00', padding: '5px'}}>
                                {item.val} <span style={{fontSize:'1rem', color:'#fff'}}>({inputs[item.id]||'?'})</span>
                            </div>
                        ))}
                    </div>
                    <div className="controls-container">
                        {phase === 'recall' && <button className="btn" onClick={checkAnswers}>فحص</button>}
                        {phase === 'result' && <button className="btn" onClick={() => setPhase('idle')}>إعادة</button>}
                        <button className="btn" style={{borderColor: '#555'}} onClick={goBack}>خروج</button>
                    </div>
                </div>
            );
        };

        // ==========================================
        // القائمة الرئيسية
        // ==========================================
        const App = () => {
            const [mode, setMode] = useState('menu');
            if (mode === 'reflex') return <ReflexGame goBack={() => setMode('menu')} />;
            if (mode === 'memory') return <MemoryGame goBack={() => setMode('menu')} />;
            return (
                <div className="app-container" style={{justifyContent: 'center'}}>
                    <h1 style={{fontSize: '2rem', marginBottom: '40px'}}>BIOHACKER TERMINAL</h1>
                    <div style={{display:'flex', flexDirection:'column', alignItems: 'center'}}>
                        <button className="btn" style={{width: '250px'}} onClick={() => setMode('reflex')}>🧪 قناص المستويات (Stages)</button>
                        <button className="btn" style={{width: '250px'}} onClick={() => setMode('memory')}>💾 ذاكرة الدوبامين</button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
