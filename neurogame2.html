<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neuro-Trainer Pro v2</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* CSS مدمج: تصميم Biohacker Dark Mode */
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
            height: 100vh; /* ضمان ملء الشاشة */
        }
        .app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%; /* استخدام كامل الارتفاع المتاح */
            padding: 10px;
            box-sizing: border-box; /* لضمان احتساب البادينغ داخل الارتفاع */
        }
        h1 {
            text-shadow: 0 0 10px #0f0;
            margin: 10px 0;
            font-size: 1.5rem;
            flex-shrink: 0; /* منع تقلص العنوان */
        }
        .stats {
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 10px;
            min-height: 30px;
            flex-shrink: 0;
        }
        
        /* منطقة اللعب المرنة */
        .game-area {
            width: 100%;
            flex-grow: 1; /* تتمدد لتأخذ المساحة المتبقية */
            border: 2px solid #333;
            background: #050505;
            position: relative;
            border-radius: 10px;
            box-shadow: 0 0 20px #003300;
            overflow: hidden;
            touch-action: none;
            min-height: 300px; /* حد أدنى للارتفاع */
        }

        /* حاوية الأزرار السفلية */
        .controls-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 10px;
            flex-shrink: 0; /* منع تقلص الأزرار */
            width: 100%;
            padding-bottom: 10px; /* مسافة أمان في الأسفل */
        }

        .target {
            position: absolute;
            width: 70px; height: 70px;
            background: #0f0; color: #000;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 2rem; font-weight: bold;
            box-shadow: 0 0 25px #0f0;
            cursor: pointer;
            transform: translate(-50%, -50%);
            animation: pulse 0.5s infinite alternate;
            z-index: 10; /* لضمان ظهوره فوق كل شيء */
        }

        @keyframes pulse { from { box-shadow: 0 0 10px #0f0; } to { box-shadow: 0 0 30px #0f0; } }

        .btn {
            background: #111; color: #0f0; border: 1px solid #0f0;
            padding: 12px 25px; font-size: 1.1rem; margin: 5px;
            cursor: pointer; transition: 0.2s; font-family: inherit;
        }
        .btn:active { background: #0f0; color: #000; }
        
        /* عناصر الذاكرة */
        .memory-item { position: absolute; font-size: 2.5rem; font-weight: bold; color: #0f0; transform: translate(-50%, -50%); }
        .input-box { position: absolute; transform: translate(-50%, -50%); width: 60px; height: 40px; background: #222; border: 1px solid #0f0; color: #fff; text-align: center; font-size: 1.5rem; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // اللعبة 1: قناص النورأدرينالين (معدلة: سرعة خارقة)
        // ==========================================
        const ReflexGame = ({ goBack }) => {
            const [gameState, setGameState] = useState('idle'); // idle, waiting, visible, result
            const [position, setPosition] = useState({ top: '50%', left: '50%' });
            const [targetNum, setTargetNum] = useState(0);
            const [startTime, setStartTime] = useState(0);
            const [msg, setMsg] = useState("المس 'ابدأ' واستعد!");
            
            // استخدام useRef لتخزين مؤقت الاختفاء حتى لا يتأثر بإعادة الرسم
            const disappearTimerRef = useRef(null);

            // تنظيف المؤقت عند الخروج من اللعبة
            useEffect(() => {
                return () => {
                    if (disappearTimerRef.current) clearTimeout(disappearTimerRef.current);
                };
            }, []);

            const startRound = () => {
                // تنظيف أي مؤقت سابق
                if (disappearTimerRef.current) clearTimeout(disappearTimerRef.current);
                
                setGameState('waiting');
                setMsg("...ترقب...");
                const delay = Math.floor(Math.random() * 2000) + 1000; // انتظار عشوائي
                
                setTimeout(() => {
                    const t = Math.floor(Math.random() * 80) + 10;
                    const l = Math.floor(Math.random() * 80) + 10;
                    setPosition({ top: `${t}%`, left: `${l}%` });
                    setTargetNum(Math.floor(Math.random() * 9) + 1);
                    setGameState('visible');
                    setStartTime(Date.now());

                    // === التعديل الجديد: مؤقت الاختفاء ===
                    // لديك 1000 ميلي ثانية (ثانية واحدة) فقط!
                    disappearTimerRef.current = setTimeout(() => {
                        handleMiss();
                    }, 1000); 
                    // ====================================

                }, delay);
            };

            const handleHit = () => {
                if (gameState !== 'visible') return;
                
                // 1. إيقاف مؤقت الاختفاء فوراً!
                if (disappearTimerRef.current) clearTimeout(disappearTimerRef.current);

                // 2. حساب النتيجة
                const diff = Date.now() - startTime;
                let feedback = diff < 300 ? "⚡ خارق!" : diff < 500 ? "🟢 ممتاز" : "🐢 جيد";
                setMsg(`${diff}ms - ${feedback}`);
                setGameState('result');
            };

            const handleMiss = () => {
                // فات الوقت!
                setMsg("فاتك الوقت! اختفى الهدف 💨");
                setGameState('result');
            };

            return (
                <div className="app-container">
                    <h1>قناص النورأدرينالين (1 ثانية!)</h1>
                    <div className="stats">{msg}</div>
                    
                    {/* منطقة اللعب */}
                    <div className="game-area" onMouseDown={() => { if(gameState==='visible') handleHit() }} onTouchStart={() => { if(gameState==='visible') handleHit() }}>
                        {gameState === 'visible' && (
                            <div className="target" 
                                 style={{ top: position.top, left: position.left }}
                                 onMouseDown={(e) => { e.stopPropagation(); handleHit(); }}
                                 onTouchStart={(e) => { e.stopPropagation(); handleHit(); }}
                            >
                                {targetNum}
                            </div>
                        )}
                    </div>

                    {/* حاوية الأزرار الجديدة (ثابتة في الأسفل) */}
                    <div className="controls-container">
                        {(gameState === 'idle' || gameState === 'result') && 
                            <button className="btn" onClick={startRound}>{gameState === 'idle' ? 'ابدأ' : 'محاولة أخرى'}</button>
                        }
                        <button className="btn" style={{borderColor: '#555'}} onClick={goBack}>خروج</button>
                    </div>
                </div>
            );
        };

        // ==========================================
        // اللعبة 2: ذاكرة الدوبامين (بدون تغيير)
        // ==========================================
        const MemoryGame = ({ goBack }) => {
            const [phase, setPhase] = useState('idle');
            const [items, setItems] = useState([]);
            const [inputs, setInputs] = useState({});
            const [timer, setTimer] = useState(0);

            const startMem = () => {
                const newItems = [];
                for(let i=0; i<5; i++) {
                    newItems.push({
                        id: i,
                        val: Math.floor(Math.random() * 90) + 10,
                        top: Math.floor(Math.random() * 80) + 10,
                        left: Math.floor(Math.random() * 80) + 10
                    });
                }
                setItems(newItems);
                setInputs({});
                setPhase('memorize');
                setTimeout(() => {
                    setPhase('maintenance');
                    setTimer(10);
                }, 3000);
            };

            useEffect(() => {
                if (phase === 'maintenance') {
                    if (timer > 0) {
                        const t = setTimeout(() => setTimer(timer - 1), 1000);
                        return () => clearTimeout(t);
                    } else {
                        setPhase('recall');
                    }
                }
            }, [phase, timer]);

            const checkAnswers = () => setPhase('result');

            return (
                <div className="app-container">
                    <h1>ذاكرة الدوبامين (تثبيت)</h1>
                    <div className="game-area">
                        {phase === 'idle' && (
                            <div className="overlay">
                                <p style={{color:'#aaa', textAlign:'center'}}>صور 5 أرقام، ثبتها في الظلام، ثم أعد كتابتها.</p>
                                <button className="btn" onClick={startMem}>بدء</button>
                            </div>
                        )}
                        {phase === 'maintenance' && (
                            <div className="overlay">
                                <h2 style={{color: '#0ff'}}>مرحلة التثبيت</h2>
                                <h1 style={{fontSize: '5rem', color: '#fff'}}>{timer}</h1>
                                <p>حافظ على الصورة في خيالك!</p>
                            </div>
                        )}
                        {phase === 'memorize' && items.map(item => (
                            <div key={item.id} className="memory-item" style={{top: `${item.top}%`, left: `${item.left}%`}}>{item.val}</div>
                        ))}
                        {phase === 'recall' && items.map(item => (
                            <div key={item.id} style={{position:'absolute', top: `${item.top}%`, left: `${item.left}%`, transform: 'translate(-50%, -50%)'}}>
                                <input type="number" className="input-box" onChange={(e) => setInputs({...inputs, [item.id]: e.target.value})} />
                            </div>
                        ))}
                        {phase === 'result' && items.map(item => (
                            <div key={item.id} className="memory-item" style={{top: `${item.top}%`, left: `${item.left}%`, color: inputs[item.id] == item.val ? '#0f0' : '#f00', border: inputs[item.id] == item.val ? '2px solid #0f0' : '2px solid #f00', padding: '5px'}}>
                                {item.val} <span style={{fontSize:'1rem', color:'#fff'}}>({inputs[item.id]||'?'})</span>
                            </div>
                        ))}
                    </div>
                    <div className="controls-container">
                        {phase === 'recall' && <button className="btn" onClick={checkAnswers}>فحص</button>}
                        {phase === 'result' && <button className="btn" onClick={() => setPhase('idle')}>إعادة</button>}
                        <button className="btn" style={{borderColor: '#555'}} onClick={goBack}>خروج</button>
                    </div>
                </div>
            );
        };

        // ==========================================
        // القائمة الرئيسية
        // ==========================================
        const App = () => {
            const [mode, setMode] = useState('menu');
            if (mode === 'reflex') return <ReflexGame goBack={() => setMode('menu')} />;
            if (mode === 'memory') return <MemoryGame goBack={() => setMode('menu')} />;
            return (
                <div className="app-container" style={{justifyContent: 'center'}}>
                    <h1 style={{fontSize: '2rem', marginBottom: '40px'}}>BIOHACKER TERMINAL</h1>
                    <div style={{display:'flex', flexDirection:'column', alignItems: 'center'}}>
                        <button className="btn" style={{width: '250px'}} onClick={() => setMode('reflex')}>🧪 قناص (1 ثانية!)</button>
                        <button className="btn" style={{width: '250px'}} onClick={() => setMode('memory')}>💾 ذاكرة (تثبيت)</button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
