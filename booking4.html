<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safar.sa | محرك حجز الفنادق الذكي</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #003580; /* Booking Blue */
            --secondary: #febb02; /* Action Yellow */
            --accent: #006ce4;
            --success: #008009;
        }
        body { font-family: 'Tajawal', sans-serif; background-color: #f3f4f5; }
        
        /* Custom Utilities */
        .btn-primary { background-color: var(--accent); color: white; transition: 0.2s; }
        .btn-primary:hover { background-color: #00487a; }
        .btn-action { background-color: var(--secondary); color: #1a1a1a; font-weight: bold; }
        .btn-action:hover { background-color: #eacb4c; }
        .card-shadow { box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
        
        /* Mada Logo Simulation */
        .mada-badge {
            background: linear-gradient(135deg, #005d6e 0%, #00aeb6 100%);
            color: white; padding: 2px 8px; border-radius: 4px; font-weight: 800; font-style: italic; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">

        // =================================================================
        // 1. قاعدة البيانات (INVENTORY & PRICING RULES)
        // هذا هو "المطبخ" حيث نضع بيانات المزودين كما طلبت
        // =================================================================
        const RAW_OFFERS = [
            // --- HILTON RIYADH (السيناريو الخاص بك) ---
            { hotelId: 101, name: 'فندق هيلتون الرياض', starRating: 5, supplier: 'Expedia', costPrice: 500, sellPrice: 600, image: 'https://images.unsplash.com/photo-1560200353-ce0a76b1d438?q=80&w=400', location: 'غرناطة، الرياض' },
            { hotelId: 101, name: 'فندق هيلتون الرياض', starRating: 5, supplier: 'Hotelbeds', costPrice: 450, sellPrice: 550, image: 'https://images.unsplash.com/photo-1560200353-ce0a76b1d438?q=80&w=400', location: 'غرناطة، الرياض' },
            { hotelId: 101, name: 'فندق هيلتون الرياض', starRating: 5, supplier: 'TBO', costPrice: 380, sellPrice: 480, image: 'https://images.unsplash.com/photo-1560200353-ce0a76b1d438?q=80&w=400', location: 'غرناطة، الرياض' },

            // --- RITZ CARLTON (للتجربة) ---
            { hotelId: 202, name: 'الريتز كارلتون', starRating: 5, supplier: 'Hotelbeds', costPrice: 1800, sellPrice: 2100, image: 'https://images.unsplash.com/photo-1566073771259-6a8506099945?q=80&w=400', location: 'حي الهدا، الرياض' },
            { hotelId: 202, name: 'الريتز كارلتون', starRating: 5, supplier: 'TBO', costPrice: 1750, sellPrice: 2050, image: 'https://images.unsplash.com/photo-1566073771259-6a8506099945?q=80&w=400', location: 'حي الهدا، الرياض' },

            // --- BRAIRA (خيار اقتصادي) ---
            { hotelId: 303, name: 'فندق بريرا العليا', starRating: 4, supplier: 'Expedia', costPrice: 400, sellPrice: 480, image: 'https://images.unsplash.com/photo-1618773928121-c32242e63f39?q=80&w=400', location: 'العليا، الرياض' },
            { hotelId: 303, name: 'فندق بريرا العليا', starRating: 4, supplier: 'WebBeds', costPrice: 350, sellPrice: 420, image: 'https://images.unsplash.com/photo-1618773928121-c32242e63f39?q=80&w=400', location: 'العليا، الرياض' }
        ];

        // =================================================================
        // 2. المحرك الذكي (THE AGGREGATION ENGINE)
        // وظيفته: تجميع العروض واختيار الأرخص
        // =================================================================
        const processHotels = (rawOffers) => {
            const hotelMap = new Map();

            rawOffers.forEach(offer => {
                if (!hotelMap.has(offer.hotelId)) {
                    // أول مرة نرى هذا الفندق، ننشئ سجلاً جديداً
                    hotelMap.set(offer.hotelId, {
                        id: offer.hotelId,
                        name: offer.name,
                        starRating: offer.starRating,
                        location: offer.location,
                        image: offer.image,
                        bestOffer: offer, // نفترض مؤقتاً أنه الأفضل
                        allOffers: [offer] // لتتبع المصادر (Admin View)
                    });
                } else {
                    // الفندق موجود، نقارن الأسعار
                    const hotel = hotelMap.get(offer.hotelId);
                    hotel.allOffers.push(offer);
                    
                    // Logic: هل السعر الحالي أرخص من الموجود؟
                    if (offer.sellPrice < hotel.bestOffer.sellPrice) {
                        hotel.bestOffer = offer; // تحديث الفائز (The Winner)
                    }
                }
            });

            return Array.from(hotelMap.values());
        };

        // =================================================================
        // 3. مكونات الواجهة (REACT COMPONENTS)
        // =================================================================

        // --- Header ---
        const Header = () => (
            <nav className="bg-[#003580] text-white py-4 px-6 shadow-md sticky top-0 z-50">
                <div className="max-w-7xl mx-auto flex justify-between items-center">
                    <div className="flex items-center gap-2">
                        <i className="fa-solid fa-plane-departure text-3xl text-[#febb02]"></i>
                        <h1 className="text-2xl font-bold tracking-wide">سفر<span className="text-[#febb02]">.السعودية</span></h1>
                    </div>
                    <div className="hidden md:flex gap-4 items-center">
                        <span className="bg-white/10 px-3 py-1 rounded cursor-pointer hover:bg-white/20">SAR <i className="fa-solid fa-chevron-down text-xs"></i></span>
                        <button className="bg-white text-[#003580] px-4 py-2 rounded font-bold hover:bg-gray-100 transition">تسجيل الدخول</button>
                    </div>
                </div>
            </nav>
        );

        // --- Search Bar ---
        const SearchBar = () => (
            <div className="bg-[#003580] pb-8 pt-2 px-6">
                <div className="max-w-7xl mx-auto bg-[#febb02] p-1 rounded-lg shadow-lg grid grid-cols-1 md:grid-cols-12 gap-1">
                    <div className="md:col-span-4 bg-white flex items-center px-4 py-3 rounded-sm">
                        <i className="fa-solid fa-bed text-gray-400 ml-3"></i>
                        <input type="text" value="الرياض، المملكة العربية السعودية" className="w-full outline-none font-bold text-gray-700" readOnly />
                    </div>
                    <div className="md:col-span-3 bg-white flex items-center px-4 py-3 rounded-sm">
                        <i className="fa-regular fa-calendar text-gray-400 ml-3"></i>
                        <span className="text-gray-700">الجمعة 26 يناير - الأحد 28 يناير</span>
                    </div>
                    <div className="md:col-span-3 bg-white flex items-center px-4 py-3 rounded-sm">
                        <i className="fa-regular fa-user text-gray-400 ml-3"></i>
                        <span className="text-gray-700">2 بالغين · 0 أطفال · 1 غرفة</span>
                    </div>
                    <div className="md:col-span-2">
                        <button className="w-full h-full bg-[#006ce4] text-white font-bold text-lg rounded-sm hover:bg-[#0057b8] transition">بحث</button>
                    </div>
                </div>
            </div>
        );

        // --- Payment Modal (Mada) ---
        const PaymentModal = ({ hotel, onClose }) => (
            <div className="fixed inset-0 bg-black/70 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                <div className="bg-white w-full max-w-md rounded-xl shadow-2xl overflow-hidden animate-[fadeIn_0.3s_ease-out]">
                    <div className="bg-[#003580] text-white p-4 flex justify-between items-center">
                        <h3 className="font-bold text-lg">تأكيد الحجز الآمن</h3>
                        <button onClick={onClose}><i className="fa-solid fa-xmark text-xl"></i></button>
                    </div>
                    <div className="p-6">
                        <div className="flex gap-4 mb-6 bg-gray-50 p-3 rounded-lg border border-gray-100">
                            <img src={hotel.image} className="w-16 h-16 rounded object-cover" />
                            <div>
                                <h4 className="font-bold text-[#003580]">{hotel.name}</h4>
                                <div className="text-xs text-gray-500 mt-1">المزود: {hotel.bestOffer.supplier}</div>
                                <div className="text-lg font-bold text-gray-800 mt-1">{hotel.bestOffer.sellPrice} ريال</div>
                            </div>
                        </div>

                        <h4 className="font-bold text-gray-800 mb-3 text-sm">اختر وسيلة الدفع:</h4>
                        <div className="space-y-3">
                            <label className="border-2 border-[#003580] bg-blue-50 p-4 rounded-lg flex justify-between items-center cursor-pointer transition hover:bg-blue-100">
                                <div className="flex items-center gap-3">
                                    <input type="radio" name="pay" defaultChecked className="w-5 h-5 accent-[#003580]"/>
                                    <div>
                                        <div className="font-bold text-gray-800 text-sm">بطاقة مدى البنكية</div>
                                        <div className="text-[10px] text-gray-500">دفع محلي آمن ومباشر</div>
                                    </div>
                                </div>
                                <span className="mada-badge">mada</span>
                            </label>
                            
                            <label className="border p-4 rounded-lg flex justify-between items-center opacity-50 cursor-not-allowed">
                                <div className="flex items-center gap-3">
                                    <input type="radio" disabled className="w-5 h-5"/>
                                    <span className="text-sm font-medium text-gray-600">فيزا / ماستركارد</span>
                                </div>
                                <div className="flex gap-2 text-xl text-gray-400"><i className="fa-brands fa-cc-visa"></i> <i className="fa-brands fa-cc-mastercard"></i></div>
                            </label>
                        </div>

                        <button onClick={() => { alert(`✅ تم الحجز بنجاح!\n\n🏨 الفندق: ${hotel.name}\n💰 السعر المدفوع: ${hotel.bestOffer.sellPrice} ريال\n📦 المزود (الخلفي): ${hotel.bestOffer.supplier}\n💳 الدفع: مدى`); onClose(); }} 
                            className="w-full mt-6 bg-[#003580] text-white py-3 rounded-lg font-bold hover:bg-[#002966] transition shadow-lg">
                            ادفع الآن ( {hotel.bestOffer.sellPrice} SAR )
                        </button>
                    </div>
                </div>
            </div>
        );

        // --- Main App Component ---
        const App = () => {
            const [hotels, setHotels] = React.useState([]);
            const [filteredHotels, setFilteredHotels] = React.useState([]);
            const [filters, setFilters] = React.useState({ minPrice: 0, maxPrice: 3000, stars: [] });
            const [selectedHotel, setSelectedHotel] = React.useState(null);

            // عند التحميل، شغل المحرك (Engine)
            React.useEffect(() => {
                const processed = processHotels(RAW_OFFERS);
                setHotels(processed);
                setFilteredHotels(processed);
            }, []);

            // دالة الفلترة
            const handleFilter = (newFilters) => {
                const updated = hotels.filter(h => {
                    const priceOk = h.bestOffer.sellPrice >= newFilters.minPrice && h.bestOffer.sellPrice <= newFilters.maxPrice;
                    const starsOk = newFilters.stars.length === 0 || newFilters.stars.includes(h.starRating);
                    return priceOk && starsOk;
                });
                setFilteredHotels(updated);
            };

            const toggleStar = (star) => {
                const newStars = filters.stars.includes(star) 
                    ? filters.stars.filter(s => s !== star) 
                    : [...filters.stars, star];
                const newF = { ...filters, stars: newStars };
                setFilters(newF);
                handleFilter(newF);
            };

            return (
                <div className="min-h-screen">
                    <Header />
                    <SearchBar />

                    <div className="max-w-7xl mx-auto px-4 py-8 flex flex-col md:flex-row gap-6">
                        
                        {/* Sidebar Filters */}
                        <div className="w-full md:w-1/4 flex-shrink-0">
                            <div className="bg-white rounded-lg shadow-sm border border-gray-200 p-4 sticky top-24">
                                <h3 className="font-bold text-gray-800 mb-4 border-b pb-2">تصفية النتائج</h3>
                                
                                <div className="mb-6">
                                    <h4 className="font-bold text-sm text-gray-700 mb-2">نطاق السعر (لليلة)</h4>
                                    <input type="range" min="0" max="3000" className="w-full accent-[#003580]" 
                                        onChange={(e) => {
                                            const val = parseInt(e.target.value);
                                            const newF = { ...filters, maxPrice: val };
                                            setFilters(newF); handleFilter(newF);
                                        }} 
                                    />
                                    <div className="flex justify-between text-xs text-gray-600 mt-1">
                                        <span>0 ريال</span>
                                        <span>{filters.maxPrice} ريال</span>
                                    </div>
                                </div>

                                <div>
                                    <h4 className="font-bold text-sm text-gray-700 mb-2">عدد النجوم</h4>
                                    {[5, 4, 3].map(star => (
                                        <div key={star} className="flex items-center gap-2 mb-2 cursor-pointer" onClick={() => toggleStar(star)}>
                                            <input type="checkbox" checked={filters.stars.includes(star)} readOnly className="accent-[#003580] w-4 h-4 cursor-pointer" />
                                            <div className="flex text-[#febb02] text-xs">
                                                {[...Array(star)].map((_, i) => <i key={i} className="fa-solid fa-star"></i>)}
                                            </div>
                                            <span className="text-sm text-gray-600">({star} نجوم)</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            
                            {/* Map Preview */}
                            <div className="mt-4 bg-white p-2 rounded-lg border border-gray-200 cursor-pointer hover:shadow-md transition">
                                <div className="h-24 bg-gray-200 rounded relative overflow-hidden bg-[url('https://cf.bstatic.com/static/img/map_entry_point/ebe4459f481c4e97669d657d425b06d860d84429.jpg')] bg-cover">
                                    <div className="absolute inset-0 flex items-center justify-center">
                                        <button className="bg-[#006ce4] text-white text-sm px-4 py-2 rounded shadow font-bold">عرض على الخريطة</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Results List */}
                        <div className="flex-grow">
                            <h2 className="text-xl font-bold text-gray-800 mb-4">الرياض: تم العثور على {filteredHotels.length} مكان للإقامة</h2>
                            
                            <div className="space-y-4">
                                {filteredHotels.map(hotel => (
                                    <div key={hotel.id} className="bg-white rounded-lg card-shadow border border-gray-100 flex flex-col md:flex-row overflow-hidden hover:border-[#006ce4] transition duration-200 group">
                                        
                                        {/* Image Section */}
                                        <div className="w-full md:w-64 h-56 md:h-auto relative flex-shrink-0">
                                            <img src={hotel.image} className="w-full h-full object-cover group-hover:scale-105 transition duration-500" />
                                            <span className="absolute top-2 right-2 bg-[#008009] text-white text-xs px-2 py-1 rounded font-bold">عرض محدود</span>
                                        </div>

                                        {/* Content Section */}
                                        <div className="p-4 flex flex-col justify-between flex-grow">
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <div className="flex items-center gap-2">
                                                        <h3 className="text-xl font-bold text-[#006ce4] cursor-pointer hover:underline">{hotel.name}</h3>
                                                        <div className="flex text-[#febb02] text-xs">
                                                            {[...Array(hotel.starRating)].map((_, i) => <i key={i} className="fa-solid fa-star"></i>)}
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="text-xs text-[#006ce4] underline mt-1 flex items-center gap-1 cursor-pointer">
                                                        <i className="fa-solid fa-location-dot"></i> {hotel.location} • 1.2 كم من المركز
                                                    </div>

                                                    <div className="mt-3 flex gap-2 flex-wrap">
                                                        <span className="bg-[#e8f7e9] text-[#008009] text-xs px-2 py-1 rounded font-bold">إفطار مشمول</span>
                                                        <span className="bg-gray-100 text-gray-600 text-xs px-2 py-1 rounded border border-gray-200">إلغاء مجاني</span>
                                                    </div>
                                                </div>

                                                <div className="flex items-start gap-2 text-left rtl:text-right">
                                                    <div className="hidden md:block">
                                                        <div className="font-bold text-gray-800 text-sm">رائع</div>
                                                        <div className="text-xs text-gray-500">1,205 تقييم</div>
                                                    </div>
                                                    <div className="bg-[#003580] text-white font-bold p-2 rounded-t-lg rounded-br-lg text-sm">9.2</div>
                                                </div>
                                            </div>

                                            {/* Price & Action Section */}
                                            <div className="mt-6 flex justify-between items-end border-t pt-4 border-gray-100">
                                                <div>
                                                    <div className="text-red-600 text-xs font-bold mb-1">تبقى غرفتان فقط بهذا السعر!</div>
                                                    <div className="text-xs text-gray-400">السعر يشمل الضرائب والرسوم</div>
                                                </div>
                                                <div className="text-left">
                                                    <div className="text-xs text-gray-500">ليلة واحدة، 2 بالغين</div>
                                                    <div className="flex items-center gap-2 justify-end">
                                                        {/* عرض السعر قبل الخصم (وهمي للتسويق) */}
                                                        <span className="text-sm text-gray-400 line-through decoration-red-500">SAR {Math.round(hotel.bestOffer.sellPrice * 1.15)}</span>
                                                        <span className="text-2xl font-bold text-gray-800">SAR {hotel.bestOffer.sellPrice}</span>
                                                    </div>
                                                    
                                                    {/* زر الحجز */}
                                                    <button onClick={() => setSelectedHotel(hotel)} className="mt-2 bg-[#006ce4] text-white px-6 py-2 rounded font-bold hover:bg-[#0057b8] transition flex items-center gap-2 shadow-lg shadow-blue-200">
                                                        تحقق من التوافر <i className="fa-solid fa-chevron-left text-xs mt-1"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {selectedHotel && <PaymentModal hotel={selectedHotel} onClose={() => setSelectedHotel(null)} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>
