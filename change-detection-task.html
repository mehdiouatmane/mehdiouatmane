<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biohack: Change Detection</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a202c; /* خلفية داكنة للتركيز */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        h1 { color: #63b3ed; margin-bottom: 20px; font-size: 1.5rem; }
        
        /* شبكة الأرقام */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 أعمدة */
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .number-box {
            background-color: #2d3748;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 3px solid transparent; /* حدود شفافة للتحضير للألوان */
        }

        /* تأثيرات التفاعل */
        .number-box:active { transform: scale(0.95); }
        
        /* الألوان حسب النتيجة */
        .correct {
            background-color: #38a169 !important; /* أخضر */
            border-color: #2f855a;
            color: white;
        }
        .wrong {
            background-color: #e53e3e !important; /* أحمر */
            border-color: #c53030;
            opacity: 0.6;
        }
        .missed {
            border-color: #38a169; /* حدود خضراء للإجابة الصحيحة التي ضاعت */
            background-color: #2d3748;
            color: #48bb78;
        }

        .btn-play {
            background-color: #4299e1;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(66, 153, 225, 0.5);
            transition: transform 0.2s;
        }
        .btn-play:hover { transform: scale(1.05); }
        .btn-play:disabled { background-color: #4a5568; cursor: not-allowed; box-shadow: none; }

        .status-text {
            height: 30px;
            margin-bottom: 15px;
            font-size: 1.1rem;
            color: #a0aec0;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // دالة مساعدة لتوليد رقم عشوائي
        const getRandomNum = () => Math.floor(Math.random() * 90) + 10; // أرقام من 10 إلى 99

        const ChangeGame = () => {
            const [numbers, setNumbers] = useState([]);
            const [changedIndex, setChangedIndex] = useState(null); // مكان الرقم المتغير
            const [gameState, setGameState] = useState('initial'); // initial, memorizing, guessing, result
            const [selectedIndex, setSelectedIndex] = useState(null);
            const [score, setScore] = useState(0);

            // عند تشغيل اللعبة لأول مرة
            useEffect(() => {
                generateNewSet();
            }, []);

            // توليد 6 أرقام عشوائية
            const generateNewSet = () => {
                const newNums = Array.from({ length: 6 }, () => getRandomNum());
                setNumbers(newNums);
                setGameState('initial');
                setSelectedIndex(null);
                setChangedIndex(null);
            };

            // عند ضغط زر "العب" (أو "تغيير")
            const handlePlay = () => {
                setGameState('memorizing'); // حالة وهمية سريعة
                
                // ومضة بسيطة (تغيير الرقم)
                setTimeout(() => {
                    const newNums = [...numbers];
                    const randomIndex = Math.floor(Math.random() * 6);
                    let newNumber;
                    
                    // تأكد أن الرقم الجديد مختلف عن القديم
                    do {
                        newNumber = getRandomNum();
                    } while (newNumber === newNums[randomIndex]);

                    newNums[randomIndex] = newNumber;
                    
                    setNumbers(newNums);
                    setChangedIndex(randomIndex);
                    setGameState('guessing'); // الآن يجب على اللاعب الاختيار
                }, 100); // تغيير فوري (100ms) لزيادة الصعوبة
            };

            // عند ضغط المستخدم على رقم
            const handleNumberClick = (index) => {
                if (gameState !== 'guessing') return;

                setSelectedIndex(index);
                setGameState('result');

                if (index === changedIndex) {
                    setScore(s => s + 1);
                    // تشغيل الصوت أو الانتقال التلقائي يمكن إضافته هنا
                } else {
                    setScore(s => Math.max(0, s - 1));
                }

                // تجهيز الجولة التالية تلقائياً بعد ثانيتين
                setTimeout(() => {
                    generateNewSet();
                }, 2500);
            };

            // تحديد الستايل المناسب لكل مربع
            const getBoxClass = (index) => {
                let classes = "number-box";
                
                if (gameState === 'result') {
                    // إذا كان هذا هو الرقم الذي اخترته
                    if (index === selectedIndex) {
                        if (index === changedIndex) {
                            return classes + " correct"; // اخترت الصحيح (أخضر)
                        } else {
                            return classes + " wrong"; // اخترت الخطأ (أحمر)
                        }
                    }
                    // إذا كان هذا هو الرقم الصحيح وأنا اخترت غيره (لتوضيح الإجابة)
                    if (index === changedIndex && index !== selectedIndex) {
                        return classes + " missed"; // إظهار مكانه الصحيح
                    }
                }
                
                return classes;
            };

            return (
                <div className="container">
                    <h1>⚡ كاشف التغيير: Visual Biohack</h1>
                    <div className="status-text">
                        {gameState === 'initial' && "احفظ الأرقام جيداً..."}
                        {gameState === 'guessing' && "أي رقم تغير؟ اضغط عليه!"}
                        {gameState === 'result' && (selectedIndex === changedIndex ? "صح! ممتاز 🧠" : "خطأ! ركز أكثر ❌")}
                    </div>

                    <div className="grid">
                        {numbers.map((num, index) => (
                            <div 
                                key={index} 
                                className={getBoxClass(index)}
                                onClick={() => handleNumberClick(index)}
                            >
                                {num}
                            </div>
                        ))}
                    </div>

                    <div style={{display: 'flex', justifyContent: 'center', gap: '20px', alignItems: 'center'}}>
                        {gameState === 'initial' ? (
                            <button className="btn-play" onClick={handlePlay}>
                                غيّر الرقم 🎲
                            </button>
                        ) : (
                             gameState === 'result' && <button className="btn-play" onClick={generateNewSet}>التالي &raquo;</button>
                        )}
                    </div>
                    
                    <p style={{marginTop: '20px', color: '#718096'}}>النقاط: {score}</p>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ChangeGame />);
    </script>
</body>
</html>
