<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiyadhBooking.com | OTA Engine Demo</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        /* Booking.com Specific Colors */
        :root {
            --b-blue: #003580;
            --b-blue-light: #0071c2;
            --b-yellow: #febb02;
            --b-green: #008009;
        }
        body { background-color: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        /* Custom Classes mimicking Booking */
        .b-header { background-color: var(--b-blue); }
        .b-btn-primary { background-color: var(--b-blue-light); color: white; }
        .b-btn-primary:hover { background-color: #00487a; }
        .b-btn-action { background-color: var(--b-yellow); color: #1a1a1a; }
        .b-btn-action:hover { background-color: #eacb4c; }
        .b-text-link { color: var(--b-blue-light); }
        .b-green-badge { color: var(--b-green); background-color: #e8f7e9; padding: 4px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        
        /* Terminal Styling */
        .terminal-scroll::-webkit-scrollbar { width: 8px; }
        .terminal-scroll::-webkit-scrollbar-track { background: #1e293b; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        
        .card-shadow { border: 1px solid #e7e7e7; border-radius: 2px; }
        .card-shadow:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">

        // --- 1. DATA (INVENTORY) ---
        const RAW_INVENTORY = [
            { source: 'Hotelbeds', id: 'HB_101', name: 'The Ritz-Carlton Riyadh', lat: 24.6650, lng: 46.6800, price: 2100, rating: 5, reviews: 9.2, reviewCount: 1205, image: 'https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=400&q=80' },
            { source: 'Expedia',   id: 'EPS_99', name: 'Ritz Carlton Hotel - Riyadh', lat: 24.6652, lng: 46.6801, price: 1950, rating: 5, reviews: 9.1, reviewCount: 800, image: '' },
            
            { source: 'Hotelbeds', id: 'HB_202', name: 'Narcissus Hotel & SPA Riyadh', lat: 24.6900, lng: 46.6850, price: 1400, rating: 5, reviews: 8.8, reviewCount: 3400, image: 'https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?auto=format&fit=crop&w=400&q=80' },
            { source: 'RateHawk',  id: 'RH_555', name: 'Narcissus Hotel',              lat: 24.6901, lng: 46.6851, price: 1150, rating: 4, reviews: 8.5, reviewCount: 120, image: '' },
            { source: 'TBO',       id: 'TBO_12', name: 'The Narcissus Riyadh',         lat: 24.6899, lng: 46.6849, price: 1300, rating: 5, reviews: 8.9, reviewCount: 450, image: '' },

            { source: 'WebBeds',   id: 'WB_777', name: 'Braira Al Olaya',              lat: 24.6950, lng: 46.6900, price: 600,  rating: 4, reviews: 8.1, reviewCount: 950, image: 'https://images.unsplash.com/photo-1611892440504-42a792e24d32?auto=format&fit=crop&w=400&q=80' }
        ];

        // --- 2. LOGIC (ALGORITHMS) ---
        const getGeoDistance = (lat1, lon1, lat2, lon2) => {
            const R = 6371e3; const φ1 = lat1 * Math.PI/180; const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180; const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        };

        const getSimilarityScore = (s1, s2) => {
            let l = s1.toLowerCase().replace(/hotel|the|resort|spa/g, "").trim();
            let s = s2.toLowerCase().replace(/hotel|the|resort|spa/g, "").trim();
            if (l.length < s.length) [l, s] = [s, l];
            if (l.length == 0) return 1.0;
            const costs = new Array();
            for (let i = 0; i <= l.length; i++) {
                let last = i;
                for (let j = 0; j <= s.length; j++) {
                    if (i == 0) costs[j] = j;
                    else if (j > 0) {
                        let newV = costs[j - 1];
                        if (l.charAt(i - 1) != s.charAt(j - 1)) newV = Math.min(Math.min(newV, last), costs[j]) + 1;
                        costs[j - 1] = last; last = newV;
                    }
                }
                if (i > 0) costs[s.length] = last;
            }
            return (l.length - costs[s.length]) / parseFloat(l.length);
        };

        // --- 3. UI COMPONENTS ---

        // HEADER (Booking Style)
        const Header = () => (
            <div className="b-header text-white pb-1">
                <div className="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
                    <h1 className="text-2xl font-bold tracking-tight">RiyadhBooking<span className="text-[#febb02]">.sa</span></h1>
                    <div className="flex gap-2">
                        <button className="bg-white/10 px-4 py-2 rounded text-sm hover:bg-white/20">Register</button>
                        <button className="bg-white px-4 py-2 rounded text-sm text-[#003580] font-bold hover:bg-gray-100">Sign in</button>
                    </div>
                </div>
                {/* Simulated Search Bar */}
                <div className="max-w-6xl mx-auto px-4 pb-8 relative z-10 hidden md:block">
                    <div className="bg-[#febb02] p-1 rounded flex gap-1">
                        <div className="bg-white flex-grow p-3 rounded-sm flex items-center text-gray-700">
                            <i className="fa-solid fa-bed mr-3 text-gray-400"></i>
                            <span className="font-medium">Riyadh</span>
                        </div>
                        <div className="bg-white flex-grow p-3 rounded-sm flex items-center text-gray-700">
                            <i className="fa-solid fa-calendar mr-3 text-gray-400"></i>
                            <span>Fri 26 Jan - Sun 28 Jan</span>
                        </div>
                        <div className="bg-white flex-grow p-3 rounded-sm flex items-center text-gray-700">
                            <i className="fa-solid fa-user mr-3 text-gray-400"></i>
                            <span>2 adults · 0 children · 1 room</span>
                        </div>
                        <button className="bg-[#0071c2] text-white px-8 text-lg font-bold rounded-sm hover:bg-[#005ba3]">Search</button>
                    </div>
                </div>
            </div>
        );

        // ADMIN PANEL (The "Tech" Proof)
        const AdminPanel = ({ logs, startEngine, processing }) => (
            <div className="bg-[#1e293b] text-white p-4 flex flex-col h-full border-r border-gray-700">
                <div className="mb-6">
                    <h2 className="font-bold text-yellow-400 text-sm tracking-wider uppercase mb-1">Backend Infrastructure</h2>
                    <p className="text-xs text-gray-400">Simulation of Microservices</p>
                </div>

                <div className="space-y-2 mb-6 text-xs font-mono">
                    <div className="flex justify-between bg-slate-800 p-2 rounded border border-slate-700">
                        <span>API Gateway (Laravel)</span> <span className="text-green-400">● Online</span>
                    </div>
                    <div className="flex justify-between bg-slate-800 p-2 rounded border border-slate-700">
                        <span>Mapping Engine (Node)</span> <span className="text-green-400">● Idle</span>
                    </div>
                    <div className="flex justify-between bg-slate-800 p-2 rounded border border-slate-700">
                        <span>Redis Cache</span> <span className="text-blue-400">6379</span>
                    </div>
                </div>

                <div className="flex-grow bg-black rounded p-3 font-mono text-[10px] md:text-xs overflow-y-auto terminal-scroll mb-4 border border-gray-700 shadow-inner h-64 md:h-auto">
                    {logs.length === 0 && <span className="text-gray-600">Waiting for command...</span>}
                    {logs.map((log, idx) => (
                        <div key={idx} className="mb-1">
                            <span className="text-gray-500">[{log.time}]</span> <span className={log.color}>{log.service}:</span> {log.message}
                        </div>
                    ))}
                    {processing && <span className="animate-pulse text-green-500">_</span>}
                </div>

                <button onClick={startEngine} disabled={processing} 
                    className={`w-full py-3 rounded font-bold transition ${processing ? 'bg-gray-600' : 'bg-blue-600 hover:bg-blue-500'}`}>
                    {processing ? <i className="fa-solid fa-gear fa-spin"></i> : <span><i className="fa-solid fa-play mr-2"></i> Run Mapping Engine</span>}
                </button>
            </div>
        );

        // MAIN APP
        const App = () => {
            const [logs, setLogs] = React.useState([]);
            const [mappedHotels, setMappedHotels] = React.useState([]);
            const [processing, setProcessing] = React.useState(false);
            const [showPayment, setShowPayment] = React.useState(null);

            const addLog = (service, message) => {
                const colors = { 'LARAVEL': 'text-red-400', 'REDIS': 'text-green-400', 'ELASTIC': 'text-yellow-400', 'MAPPING': 'text-cyan-400' };
                setLogs(prev => [...prev, { time: new Date().toLocaleTimeString('en-US',{hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'}), service, message, color: colors[service] }]);
            };

            const startEngine = async () => {
                setProcessing(true); setLogs([]); setMappedHotels([]);
                addLog('LARAVEL', 'Checking Supplier APIs health...');
                await new Promise(r => setTimeout(r, 400));
                addLog('REDIS', 'Cache miss. Fetching fresh inventory.');
                
                let finalMap = []; let processedIds = new Set();
                
                for (let i = 0; i < RAW_INVENTORY.length; i++) {
                    const c = RAW_INVENTORY[i];
                    if (processedIds.has(c.id)) continue;
                    
                    let master = { ...c, sources: [c], lowestPrice: c.price, provider: c.source };
                    processedIds.add(c.id);
                    addLog('MAPPING', `Analyzing: ${c.name.substring(0,25)}...`);

                    for (let j = i + 1; j < RAW_INVENTORY.length; j++) {
                        const cmp = RAW_INVENTORY[j];
                        if (processedIds.has(cmp.id)) continue;

                        const dist = getGeoDistance(c.lat, c.lng, cmp.lat, cmp.lng);
                        if (dist < 100) {
                            const sim = getSimilarityScore(c.name, cmp.name);
                            if (sim > 0.70) {
                                addLog('MAPPING', `>> MERGE: ${cmp.name} (${Math.round(sim*100)}%)`);
                                master.sources.push(cmp); processedIds.add(cmp.id);
                                if (cmp.price < master.lowestPrice) { master.lowestPrice = cmp.price; master.provider = cmp.source; }
                            }
                        }
                    }
                    finalMap.push(master);
                    await new Promise(r => setTimeout(r, 150));
                }
                addLog('ELASTIC', `Indexed ${finalMap.length} unique properties.`);
                setMappedHotels(finalMap); setProcessing(false);
            };

            return (
                <div className="flex flex-col md:flex-row min-h-screen">
                    {/* Left: Admin Control (30%) */}
                    <div className="w-full md:w-80 flex-shrink-0 h-[400px] md:h-auto overflow-hidden">
                        <AdminPanel logs={logs} startEngine={startEngine} processing={processing} />
                    </div>

                    {/* Right: Booking UI (70%) */}
                    <div className="flex-grow flex flex-col h-screen overflow-y-auto">
                        <Header />
                        
                        <div className="max-w-6xl mx-auto px-4 py-6 w-full">
                            
                            {/* Breadcrumbs */}
                            <div className="text-xs text-blue-600 mb-4 flex gap-1">
                                <span>Home</span> <span>&gt;</span> <span>Saudi Arabia</span> <span>&gt;</span> <span className="text-gray-500">Riyadh</span>
                            </div>

                            <div className="flex flex-col md:flex-row gap-6">
                                {/* Fake Filters Sidebar */}
                                <div className="w-64 hidden md:block flex-shrink-0">
                                    <div className="bg-white border rounded p-3 mb-2">
                                        <img src="https://cf.bstatic.com/static/img/map_entry_point/ebe4459f481c4e97669d657d425b06d860d84429.jpg" className="w-full rounded mb-2"/>
                                        <button className="text-blue-600 font-bold text-sm border border-blue-600 w-full py-1 rounded hover:bg-blue-50">Show on map</button>
                                    </div>
                                    <div className="bg-white border rounded p-3">
                                        <h3 className="font-bold text-sm mb-3 text-gray-800">Filter by:</h3>
                                        <div className="space-y-2 text-sm text-gray-700">
                                            <div className="flex items-center gap-2"><input type="checkbox" checked readOnly/> <span>Hotels</span></div>
                                            <div className="flex items-center gap-2"><input type="checkbox"/> <span>Apartments</span></div>
                                            <div className="flex items-center gap-2"><input type="checkbox"/> <span>5 stars</span></div>
                                        </div>
                                    </div>
                                </div>

                                {/* Results List */}
                                <div className="flex-grow">
                                    <h2 className="text-2xl font-bold text-gray-800 mb-4">Riyadh: {mappedHotels.length > 0 ? mappedHotels.length : 0} properties found</h2>
                                    
                                    {mappedHotels.length === 0 && !processing ? (
                                        <div className="bg-white p-10 text-center border rounded">
                                            <i className="fa-solid fa-server text-4xl text-gray-300 mb-4"></i>
                                            <p className="text-gray-500">Inventory not loaded. Please run the Mapping Engine from the sidebar.</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            {mappedHotels.map((h, i) => (
                                                <div key={i} className="bg-white p-4 card-shadow flex flex-col sm:flex-row gap-4 relative">
                                                    
                                                    {/* Image */}
                                                    <div className="w-full sm:w-52 h-52 flex-shrink-0 relative">
                                                        <img src={h.image || 'https://via.placeholder.com/300x300?text=No+Image'} className="w-full h-full object-cover rounded-sm" />
                                                        <span className="absolute top-2 left-2 bg-red-600 text-white text-xs px-2 py-1 rounded font-bold">Early 2026 Deal</span>
                                                    </div>

                                                    {/* Content */}
                                                    <div className="flex-grow flex flex-col justify-between">
                                                        <div className="flex justify-between items-start">
                                                            <div>
                                                                <h3 className="text-xl font-bold text-[#0071c2] hover:underline cursor-pointer flex items-center gap-2">
                                                                    {h.name}
                                                                    <div className="flex text-yellow-400 text-xs">
                                                                        {[...Array(h.rating)].map((_,x)=><i key={x} className="fa-solid fa-star"></i>)}
                                                                    </div>
                                                                </h3>
                                                                <div className="text-xs text-[#0071c2] underline mt-1 cursor-pointer">Riyadh • 3.2 km from center</div>
                                                                <div className="mt-2 text-xs text-gray-600 border-l-2 border-gray-300 pl-2">
                                                                    Inventory Sources: {h.sources.map(s=>s.source).join(', ')}
                                                                </div>
                                                            </div>
                                                            
                                                            {/* Rating Box */}
                                                            <div className="flex items-start gap-2 text-right">
                                                                <div>
                                                                    <div className="font-bold text-gray-800 text-sm">Superb</div>
                                                                    <div className="text-xs text-gray-500">{h.reviewCount.toLocaleString()} reviews</div>
                                                                </div>
                                                                <div className="bg-[#003580] text-white font-bold p-2 rounded-t-md rounded-br-md text-sm">{h.reviews}</div>
                                                            </div>
                                                        </div>

                                                        {/* Description */}
                                                        <div className="mt-2 text-xs border-l-2 border-gray-200 pl-2 text-gray-600">
                                                            <p className="line-clamp-2">Experience world-class service at {h.name}. Located in the heart of Riyadh...</p>
                                                        </div>

                                                        {/* Badges */}
                                                        <div className="flex gap-2 mt-3">
                                                            <span className="b-green-badge">Sustainable Level 2</span>
                                                            <span className="text-[#008009] font-bold text-xs flex items-center"><i className="fa-solid fa-check mr-1"></i> Breakfast included</span>
                                                        </div>

                                                        {/* Price Section */}
                                                        <div className="mt-4 flex justify-between items-end">
                                                            <div className="text-red-600 text-xs font-bold">Only 2 rooms left at this price on our site</div>
                                                            <div className="text-right">
                                                                <div className="text-xs text-gray-400">1 night, 2 adults</div>
                                                                <div className="text-2xl font-bold text-gray-800 flex items-center justify-end gap-2">
                                                                    <span className="text-sm font-normal text-gray-500 line-through">SAR {Math.round(h.lowestPrice * 1.2)}</span>
                                                                    SAR {h.lowestPrice}
                                                                </div>
                                                                <div className="text-xs text-gray-500 mb-2">+SAR 150 taxes and charges</div>
                                                                <button onClick={()=>setShowPayment(h)} className="b-btn-primary px-4 py-2 rounded font-bold text-sm flex items-center gap-2">
                                                                    See availability <i className="fa-solid fa-angle-right"></i>
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* MADA PAYMENT MODAL */}
                    {showPayment && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-lg rounded-lg shadow-2xl overflow-hidden">
                                <div className="bg-[#003580] text-white p-4 flex justify-between items-center">
                                    <h3 className="font-bold text-lg">Secure Booking</h3>
                                    <button onClick={()=>setShowPayment(null)} className="hover:text-gray-300"><i className="fa-solid fa-xmark text-xl"></i></button>
                                </div>
                                <div className="p-6">
                                    <div className="flex gap-4 mb-6 border-b pb-4">
                                        <div className="w-20 h-20 bg-gray-200 rounded overflow-hidden">
                                            {showPayment.image && <img src={showPayment.image} className="w-full h-full object-cover"/>}
                                        </div>
                                        <div>
                                            <h4 className="font-bold text-[#003580]">{showPayment.name}</h4>
                                            <div className="text-sm text-gray-600">1 Night · Standard Double Room</div>
                                            <div className="text-green-600 text-sm font-bold mt-1"><i className="fa-solid fa-check"></i> Free Cancellation</div>
                                        </div>
                                    </div>
                                    
                                    <h4 className="font-bold text-gray-800 mb-3">How do you want to pay?</h4>
                                    <div className="space-y-3">
                                        <label className="border-2 border-[#003580] bg-blue-50 p-4 rounded flex justify-between items-center cursor-pointer">
                                            <div className="flex items-center gap-3">
                                                <input type="radio" name="pay" defaultChecked className="w-5 h-5 text-blue-600"/>
                                                <div>
                                                    <div className="font-bold text-gray-800">Mada Debit Card</div>
                                                    <div className="text-xs text-gray-500">Local Payment Gateway</div>
                                                </div>
                                            </div>
                                            {/* Simulated Mada Logo */}
                                            <div className="h-6 w-16 bg-gradient-to-r from-[#005d6e] to-[#00aeb6] text-white text-[10px] font-bold italic flex items-center justify-center rounded">mada</div>
                                        </label>

                                        <label className="border p-4 rounded flex justify-between items-center opacity-60">
                                            <div className="flex items-center gap-3">
                                                <input type="radio" name="pay" disabled className="w-5 h-5"/>
                                                <span className="font-medium">Visa / Mastercard</span>
                                            </div>
                                            <div className="flex gap-1 text-xl"><i className="fa-brands fa-cc-visa"></i> <i className="fa-brands fa-cc-mastercard"></i></div>
                                        </label>
                                    </div>
                                    
                                    <div className="mt-6 flex justify-between items-center">
                                        <div>
                                            <div className="text-xs text-gray-500">Total Price</div>
                                            <div className="text-2xl font-bold text-gray-800">SAR {showPayment.lowestPrice}</div>
                                        </div>
                                        <button onClick={()=>{alert('Transaction Approved via Mada!'); setShowPayment(null);}} 
                                            className="bg-[#003580] hover:bg-[#002860] text-white px-8 py-3 rounded font-bold text-lg">
                                            Pay Now
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
