<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safar.sa | نظام حجز الفنادق الموحد (B2B/B2C)</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #003580;
            --secondary: #febb02;
            --accent: #006ce4;
            --success: #008009;
        }
        body { font-family: 'Tajawal', sans-serif; background-color: #f0f2f5; }
        
        /* Utility Classes */
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .transition-all { transition: all 0.3s ease; }
        
        /* Simulation Terminal */
        .terminal { background: #1e1e1e; color: #00ff00; font-family: 'Courier New', monospace; font-size: 11px; }
        .terminal-line { border-bottom: 1px solid #333; padding: 2px 0; }
        
        /* Mada Badge */
        .mada-badge {
            background: linear-gradient(135deg, #005d6e 0%, #00aeb6 100%);
            color: white; padding: 2px 8px; border-radius: 4px; font-weight: 800; font-style: italic;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">

        // =================================================================
        // 1. البيانات الخام (Raw Data from 5 Suppliers)
        // لاحظ: الأسماء مختلفة قليلاً، والإحداثيات مختلفة قليلاً (Drifting)
        // =================================================================
        const RAW_DATA = [
            // Case 1: HILTON RIYADH (3 Suppliers)
            // الهدف: يجب أن يظهر كفندق واحد بسعر 480 ريال (TBO)
            { id: 'EXP_101', name: 'Hilton Riyadh Hotel & Residences', lat: 24.774265, lng: 46.738586, supplier: 'Expedia', price: 600, rating: 5, img: 'https://images.unsplash.com/photo-1560200353-ce0a76b1d438?w=500' },
            { id: 'HB_550',  name: 'Hilton Riyadh',                    lat: 24.774200, lng: 46.738500, supplier: 'Hotelbeds', price: 550, rating: 5, img: 'https://images.unsplash.com/photo-1560200353-ce0a76b1d438?w=500' },
            { id: 'TBO_99',  name: 'The Hilton Hotel - Granada',       lat: 24.774300, lng: 46.738600, supplier: 'TBO',       price: 480, rating: 5, img: '' }, // No image here, should inherit from master

            // Case 2: NARCISSUS (2 Suppliers)
            { id: 'HB_200',  name: 'Narcissus Hotel & SPA',            lat: 24.690000, lng: 46.685000, supplier: 'Hotelbeds', price: 1200, rating: 5, img: 'https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?w=500' },
            { id: 'RH_300',  name: 'Narcissus Riyadh',                 lat: 24.690100, lng: 46.685100, supplier: 'RateHawk',  price: 1150, rating: 5, img: '' },

            // Case 3: BRAIRA (1 Supplier)
            { id: 'WB_700',  name: 'Braira Al Olaya',                  lat: 24.695000, lng: 46.690000, supplier: 'WebBeds',   price: 450,  rating: 4, img: 'https://images.unsplash.com/photo-1618773928121-c32242e63f39?w=500' },

             // Case 4: CROWNE PLAZA (Expensive option for filtering)
            { id: 'EXP_888', name: 'Crowne Plaza RDC',                 lat: 24.730000, lng: 46.620000, supplier: 'Expedia',   price: 2500, rating: 5, img: 'https://images.unsplash.com/photo-1578683010236-d716f9a3f461?w=500' }
        ];

        // =================================================================
        // 2. THE MAPPING ENGINE (خوارزمية التوحيد)
        // هذا هو "العقل" الذي يطلبونه في العرض
        // =================================================================
        
        // حساب المسافة بين نقطتين (Haversine Formula)
        const getDistance = (lat1, lon1, lat2, lon2) => {
            const R = 6371e3; // متر
            const φ1 = lat1 * Math.PI/180; const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180; const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        };

        // حساب نسبة تشابه النصوص (Levenshtein simplified)
        const getSimilarity = (s1, s2) => {
            let l = s1.toLowerCase().replace(/hotel|the|resort|spa|-|&/g, "").trim();
            let s = s2.toLowerCase().replace(/hotel|the|resort|spa|-|&/g, "").trim();
            if(l.includes(s) || s.includes(l)) return 0.9; // Hack for demo: if one contains other, high score
            return 0.5; 
        };

        // المحرك الرئيسي
        const runMappingEngine = (rawData) => {
            let mappedHotels = [];
            let processedIDs = new Set();
            let logs = []; // For Admin Terminal

            rawData.forEach((item, index) => {
                if (processedIDs.has(item.id)) return;

                // 1. إنشاء "سجل رئيسي" (Master Record)
                let master = { ...item, suppliers: [item], lowestPrice: item.price, bestSupplier: item.supplier };
                processedIDs.add(item.id);
                logs.push(`🔍 جاري تحليل: ${item.name} (${item.supplier})`);

                // 2. مقارنة هذا الفندق مع الباقين
                for (let j = index + 1; j < rawData.length; j++) {
                    let candidate = rawData[j];
                    if (processedIDs.has(candidate.id)) continue;

                    // A. فلتر المسافة (Geo-Fencing) - نطاق 100 متر
                    const distance = getDistance(master.lat, master.lng, candidate.lat, candidate.lng);
                    
                    if (distance < 200) {
                        // B. فلتر الاسم (Name Similarity)
                        // في هذا الديمو، سنعتبر المسافة القريبة دليلاً كافياً للدمج
                        logs.push(`✅ تطابق مؤكد! دمج ${candidate.name} مع ${master.name}`);
                        
                        // C. الدمج (Mapping)
                        master.suppliers.push(candidate);
                        processedIDs.add(candidate.id);

                        // D. تحديث السعر الأفضل (Best Price Logic)
                        if (candidate.price < master.lowestPrice) {
                            master.lowestPrice = candidate.price;
                            master.bestSupplier = candidate.supplier;
                            // إذا كان السجل الجديد يحتوي على صورة والأصلي لا، نأخذ الصورة
                            if (!master.img && candidate.img) master.img = candidate.img;
                        }
                    }
                }
                mappedHotels.push(master);
            });

            return { result: mappedHotels, logs: logs };
        };

        // =================================================================
        // 3. UI COMPONENTS
        // =================================================================

        const AdminTerminal = ({ logs }) => (
            <div className="bg-black text-green-400 p-4 font-mono text-xs h-64 overflow-y-auto border-t-4 border-green-600 shadow-2xl rounded-lg mb-6">
                <div className="flex justify-between border-b border-gray-700 pb-2 mb-2">
                    <span className="font-bold">🖥️ SERVER LOGS (Laravel/Horizon)</span>
                    <span className="animate-pulse">● Live</span>
                </div>
                {logs.map((log, i) => (
                    <div key={i} className="terminal-line">
                        <span className="text-gray-500">[{new Date().toLocaleTimeString()}]</span> {log}
                    </div>
                ))}
                <div className="terminal-line animate-pulse">_ Waiting for jobs...</div>
            </div>
        );

        const Filters = ({ filters, setFilters }) => (
            <div className="bg-white p-4 rounded-lg shadow-sm border border-gray-200 sticky top-24">
                <h3 className="font-bold text-gray-800 mb-4 text-lg">تصفية النتائج</h3>
                
                {/* Price Slider */}
                <div className="mb-6">
                    <label className="text-sm font-bold text-gray-600 mb-2 block">الحد الأقصى للسعر</label>
                    <input 
                        type="range" min="100" max="3000" step="50"
                        value={filters.maxPrice}
                        onChange={(e) => setFilters({...filters, maxPrice: Number(e.target.value)})}
                        className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-[#003580]"
                    />
                    <div className="flex justify-between mt-2 font-bold text-[#003580]">
                        <span>0 ر.س</span>
                        <span>{filters.maxPrice} ر.س</span>
                    </div>
                </div>

                {/* Stars */}
                <div>
                    <label className="text-sm font-bold text-gray-600 mb-2 block">تصنيف النجوم</label>
                    {[5, 4, 3].map(star => (
                        <div key={star} className="flex items-center gap-2 mb-2">
                            <input 
                                type="checkbox" 
                                checked={filters.stars.includes(star)}
                                onChange={() => {
                                    const newStars = filters.stars.includes(star) 
                                        ? filters.stars.filter(s => s !== star)
                                        : [...filters.stars, star];
                                    setFilters({...filters, stars: newStars});
                                }}
                                className="w-5 h-5 accent-[#febb02]"
                            />
                            <div className="flex text-[#febb02] text-xs">
                                {[...Array(star)].map((_, i) => <i key={i} className="fa-solid fa-star"></i>)}
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const HotelCard = ({ hotel, onBook }) => (
            <div className="bg-white rounded-lg border border-gray-200 p-4 mb-4 flex flex-col md:flex-row gap-4 card-hover transition-all relative overflow-hidden group">
                
                {/* Image */}
                <div className="w-full md:w-64 h-48 md:h-auto bg-gray-200 rounded-md overflow-hidden relative flex-shrink-0">
                    <img src={hotel.img || 'https://via.placeholder.com/300'} className="w-full h-full object-cover group-hover:scale-110 transition duration-500" />
                    <div className="absolute top-2 right-2 bg-[#008009] text-white text-xs font-bold px-2 py-1 rounded shadow">
                        أرخص سعر مضمون
                    </div>
                </div>

                {/* Content */}
                <div className="flex-grow flex flex-col justify-between">
                    <div>
                        <div className="flex justify-between items-start">
                            <h3 className="text-xl font-bold text-[#006ce4] mb-1">{hotel.name}</h3>
                            <div className="bg-[#003580] text-white p-2 rounded-lg text-sm font-bold text-center leading-none">
                                {hotel.rating * 1.8} <br/><span className="text-[10px] font-normal">رائع</span>
                            </div>
                        </div>
                        <div className="flex text-[#febb02] text-xs mb-2">
                            {[...Array(hotel.rating)].map((_, i) => <i key={i} className="fa-solid fa-star"></i>)}
                        </div>
                        <p className="text-xs text-gray-500 flex items-center gap-1 mb-4">
                            <i className="fa-solid fa-location-dot"></i> 2.5 كم من وسط المدينة
                        </p>

                        {/* Mapping Proof Section (The Magic) */}
                        <div className="bg-gray-50 border border-gray-200 rounded p-2 text-xs">
                            <p className="font-bold text-gray-700 mb-1">🔍 تم تجميع المخزون من {hotel.suppliers.length} مزودين:</p>
                            <div className="flex flex-wrap gap-2">
                                {hotel.suppliers.map((sup, idx) => (
                                    <span key={idx} className={`px-2 py-1 rounded border ${sup.supplier === hotel.bestSupplier ? 'bg-green-100 border-green-400 text-green-700 font-bold' : 'bg-white border-gray-300 text-gray-500'}`}>
                                        {sup.supplier}: {sup.price} ر.س
                                        {sup.supplier === hotel.bestSupplier && <i className="fa-solid fa-check mr-1"></i>}
                                    </span>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="flex justify-between items-end mt-4 pt-4 border-t border-gray-100">
                        <div className="text-xs text-red-500 font-bold">
                            <i className="fa-solid fa-fire"></i> حجز مرتين في آخر ساعة
                        </div>
                        <div className="text-left">
                            <div className="text-xs text-gray-400">سعر الليلة لشخصين</div>
                            <div className="flex items-center gap-2 justify-end">
                                <span className="text-sm text-gray-400 line-through">
                                    {Math.round(hotel.lowestPrice * 1.2)} ر.س
                                </span>
                                <span className="text-2xl font-bold text-gray-800">{hotel.lowestPrice} ر.س</span>
                            </div>
                            <button onClick={() => onBook(hotel)} className="bg-[#006ce4] text-white px-6 py-2 rounded font-bold hover:bg-[#005ba3] transition shadow mt-1 flex items-center gap-2">
                                عرض التوافر <i className="fa-solid fa-angle-left text-sm mt-1"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        );

        const PaymentModal = ({ hotel, onClose }) => (
            <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-md">
                <div className="bg-white w-full max-w-md rounded-xl overflow-hidden shadow-2xl">
                    <div className="bg-[#003580] p-4 flex justify-between items-center text-white">
                        <h3 className="font-bold">إتمام الحجز الآمن</h3>
                        <button onClick={onClose}><i className="fa-solid fa-xmark text-lg"></i></button>
                    </div>
                    <div className="p-6">
                        <div className="flex gap-4 mb-6 pb-6 border-b border-gray-100">
                            <img src={hotel.img || 'https://via.placeholder.com/100'} className="w-20 h-20 rounded object-cover" />
                            <div>
                                <h4 className="font-bold text-[#003580]">{hotel.name}</h4>
                                <div className="text-sm text-gray-500">غرفة قياسية مزدوجة</div>
                                <div className="text-xs text-green-600 font-bold mt-1">✓ إلغاء مجاني</div>
                            </div>
                        </div>

                        <div className="mb-4">
                            <label className="block border-2 border-[#003580] bg-blue-50 p-4 rounded-lg cursor-pointer flex justify-between items-center">
                                <div className="flex items-center gap-3">
                                    <input type="radio" checked readOnly className="w-5 h-5 accent-[#003580]" />
                                    <div>
                                        <div className="font-bold text-gray-800">الدفع عبر مدى</div>
                                        <div className="text-xs text-gray-500">بطاقة الخصم المباشر المحلية</div>
                                    </div>
                                </div>
                                <span className="mada-badge">mada</span>
                            </label>
                        </div>

                        <div className="flex justify-between items-center mt-6">
                            <div>
                                <div className="text-xs text-gray-500">الإجمالي النهائي</div>
                                <div className="text-2xl font-bold text-gray-900">{hotel.lowestPrice} ر.س</div>
                            </div>
                            <button 
                                onClick={() => {alert(`تم الحجز بنجاح عبر ${hotel.bestSupplier} بسعر ${hotel.lowestPrice}`); onClose();}}
                                className="bg-[#febb02] text-gray-900 px-8 py-3 rounded font-bold hover:bg-[#e5a800] transition">
                                ادفع الآن
                            </button>
                        </div>
                        <div className="text-center mt-4 text-[10px] text-gray-400">
                            <i className="fa-solid fa-lock"></i> العملية مؤمنة بتقنية SSL 256-bit
                        </div>
                    </div>
                </div>
            </div>
        );

        // =================================================================
        // 4. MAIN APP
        // =================================================================
        const App = () => {
            const [mappedData, setMappedData] = React.useState([]);
            const [logs, setLogs] = React.useState([]);
            const [filters, setFilters] = React.useState({ maxPrice: 3000, stars: [] });
            const [loading, setLoading] = React.useState(true);
            const [selectedHotel, setSelectedHotel] = React.useState(null);

            // تشغيل المحرك عند التحميل
            React.useEffect(() => {
                setTimeout(() => {
                    const { result, logs } = runMappingEngine(RAW_DATA);
                    setMappedData(result);
                    setLogs(logs);
                    setLoading(false);
                }, 1500); // محاكاة وقت التحميل
            }, []);

            // منطق الفلترة (يطبق على البيانات الموحدة)
            const filteredHotels = mappedData.filter(h => {
                const priceOk = h.lowestPrice <= filters.maxPrice;
                const starsOk = filters.stars.length === 0 || filters.stars.includes(h.rating);
                return priceOk && starsOk;
            });

            return (
                <div className="min-h-screen pb-10">
                    {/* Header */}
                    <header className="bg-[#003580] text-white py-4 shadow-lg sticky top-0 z-40">
                        <div className="container mx-auto px-4 flex justify-between items-center">
                            <h1 className="text-2xl font-extrabold tracking-wide">Safar<span className="text-[#febb02]">.sa</span></h1>
                            <div className="hidden md:flex gap-4">
                                <button className="text-white hover:bg-white/10 px-3 py-1 rounded">SAR</button>
                                <button className="bg-white text-[#003580] px-4 py-1 rounded font-bold hover:bg-gray-100">دخول الشركاء</button>
                            </div>
                        </div>
                    </header>

                    {/* Search Bar Simulation */}
                    <div className="bg-[#003580] pb-10 px-4">
                        <div className="container mx-auto bg-[#febb02] p-1 rounded grid grid-cols-1 md:grid-cols-12 gap-1 shadow-xl transform translate-y-6">
                            <div className="md:col-span-5 bg-white p-3 flex items-center rounded-sm">
                                <i className="fa-solid fa-bed text-gray-400 ml-2"></i>
                                <span className="font-bold text-gray-700">الرياض، المملكة العربية السعودية</span>
                            </div>
                            <div className="md:col-span-3 bg-white p-3 flex items-center rounded-sm border-r border-gray-100">
                                <i className="fa-solid fa-calendar text-gray-400 ml-2"></i>
                                <span className="text-gray-600">26 يناير - 28 يناير</span>
                            </div>
                            <div className="md:col-span-3 bg-white p-3 flex items-center rounded-sm border-r border-gray-100">
                                <i className="fa-solid fa-user text-gray-400 ml-2"></i>
                                <span className="text-gray-600">2 بالغين، 1 غرفة</span>
                            </div>
                            <div className="md:col-span-1">
                                <button className="w-full h-full bg-[#006ce4] text-white font-bold rounded-sm hover:bg-[#0057b8]">بحث</button>
                            </div>
                        </div>
                    </div>

                    <div className="container mx-auto px-4 mt-16 flex flex-col lg:flex-row gap-8">
                        
                        {/* Sidebar (Admin & Filters) */}
                        <aside className="w-full lg:w-1/4 flex-shrink-0">
                            <AdminTerminal logs={logs} />
                            <Filters filters={filters} setFilters={setFilters} />
                        </aside>

                        {/* Results */}
                        <main className="flex-grow">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-xl font-bold text-gray-800">
                                    الرياض: تم العثور على {filteredHotels.length} أماكن إقامة
                                </h2>
                                <div className="text-sm text-gray-500">
                                    <span className="font-bold text-[#003580]">الترتيب حسب:</span> الأقل سعراً أولاً
                                </div>
                            </div>

                            {loading ? (
                                <div className="space-y-4">
                                    {[1,2,3].map(i => <div key={i} className="h-48 bg-gray-200 rounded animate-pulse"></div>)}
                                </div>
                            ) : filteredHotels.length === 0 ? (
                                <div className="text-center py-20 bg-white rounded border border-gray-200">
                                    <i className="fa-solid fa-filter-circle-xmark text-4xl text-gray-300 mb-4"></i>
                                    <p className="text-gray-500">لا توجد نتائج تطابق الفلاتر الحالية.</p>
                                </div>
                            ) : (
                                filteredHotels.sort((a,b) => a.lowestPrice - b.lowestPrice).map((hotel, idx) => (
                                    <HotelCard key={idx} hotel={hotel} onBook={setSelectedHotel} />
                                ))
                            )}
                        </main>
                    </div>

                    {selectedHotel && <PaymentModal hotel={selectedHotel} onClose={() => setSelectedHotel(null)} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>
