<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura Tech SaaS - المحرك الذكي</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tech: { dark: '#050505', primary: '#3B82F6', secondary: '#8B5CF6', surface: '#111113', card: '#18181B' },
                    },
                    fontFamily: { cairo: ['Cairo', 'sans-serif'] },
                    animation: { 'fade-in': 'fadeIn 0.4s ease-out', 'slide-up': 'slideUp 0.4s ease-out' },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: white; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3B82F6; border-radius: 10px; }
    </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">

    // ==========================================
    // 1. قاعدة بيانات المنتجات (محرك البحث)
    // ==========================================
    const productsDatabase = [
        { id: 1, name: 'Lenovo Legion Pro 7i', type: 'pc', specs: 'i9-14th, RTX 4080, 32GB RAM', price: '25,000 DH', tags: ['gaming', 'architecture', 'heavy', 'لوميون', 'هندسة'], storeIds: [1, 2] },
        { id: 2, name: 'MacBook Pro M3 Max', type: 'pc', specs: '14-core CPU, 30-core GPU', price: '38,000 DH', tags: ['montage', 'video', 'heavy', 'مونتاج', 'آبل'], storeIds: [3] },
        { id: 3, name: 'iPhone 15 Pro Max', type: 'phone', specs: 'A17 Pro, 256GB, Titanium', price: '12,500 DH', tags: ['camera', 'status', 'heavy', 'تصوير', 'ايفون'], storeIds: [3, 4] },
        { id: 4, name: 'NVIDIA RTX 4070 Ti Super', type: 'parts', specs: '16GB VRAM GDDR6X', price: '9,500 DH', tags: ['gpu', 'gaming', 'upgrade', 'كارت شاشة'], storeIds: [1] },
        { id: 5, name: 'Trottinette Xiaomi Pro 4', type: 'mobility', specs: '45km Range, 25km/h, 10" Tires', price: '5,500 DH', tags: ['scooter', 'transport', 'دراجة', 'سكوتر'], storeIds: [5] }
    ];

    // ==========================================
    // 2. قاعدة بيانات المتاجر المتقدمة (GPS & Info)
    // ==========================================
    const storesDatabase = {
        1: { name: "PC Gamer Casa (رسمي)", category: "رسمي", address: "المعاريف، الدار البيضاء", phone: "0600-112233", map: "#", social: "@pcgamercasa", isWholesale: false },
        2: { name: "Derb Ghallef Hub (موازي)", category: "موازي", address: "درب غلف، كازا", phone: "0611-223344", map: "#", social: "@derb_tech", isWholesale: true },
        3: { name: "iStyle / Virgin", category: "رسمي", address: "موروكو مول، كازا", phone: "0522-000000", map: "#", social: "@istylemaroc", isWholesale: false },
        4: { name: "AzzamPhone", category: "موازي", address: "قيسارية طارق، الرباط", phone: "0622-334455", map: "#", social: "@azzamphone", isWholesale: true },
        5: { name: "Electro Mobility", category: "رسمي وموازي", address: "كراج علال (سوق الجملة)", phone: "0699-887766", map: "#", social: "@electro_mob", isWholesale: true }
    };

    // ==========================================
    // 3. قاعدة بيانات فحص القطع (Hardware Clinic)
    // ==========================================
    const inspectionQuestions = {
        parts: [
            { title: 'فحص كارت الشاشة (GPU)', icon: 'fa-microchip', instruction: 'افحص المنافذ النحاسية (PCIe) وشغل FurMark لـ 10 دقائق.', options: [ { text: 'حرارة > 85° أو النحاس مخدوش بشدة', status: 'bad', defect: 'استُعملت في التعدين (Mining) أو تالفة.', price: 4000 }, { text: 'حرارة مستقرة والنحاس نظيف', status: 'good', defect: '', price: 0 } ] },
            { title: 'فحص الشاشة (Display Panel)', icon: 'fa-tv', instruction: 'افتح صورة بيضاء بالكامل وصورة سوداء بالكامل (Dead Pixel Test).', options: [ { text: 'توهج أبيض (Bleeding) أو نقط سوداء', status: 'bad', defect: 'شاشة مقلدة (LCD بدل OLED) أو مضروبة.', price: 1500 }, { text: 'ألوان صافية وسواد عميق', status: 'good', defect: '', price: 0 } ] }
        ],
        mobility: [
            { title: 'فحص بطارية الدراجة الكهربائية', icon: 'fa-car-battery', instruction: 'ارفع العجلة في الهواء واضغط دواسة السرعة كاملة، هل ينخفض مؤشر البطارية فجأة؟', options: [ { text: 'المؤشر ينزل بسرعة عند الضغط', status: 'bad', defect: 'خلايا الليثيوم ميتة (Cell Degradation).', price: 2000 }, { text: 'المؤشر ثابت والسرعة قصوى', status: 'good', defect: '', price: 0 } ] },
            { title: 'فحص المحرك (Hub Motor)', icon: 'fa-dharmachakra', instruction: 'قم بتدوير العجلة التي بها المحرك بيدك ببطء. هل تسمع طقطقة أو مقاومة متقطعة؟', options: [ { text: 'مقاومة قوية وصوت احتكاك', status: 'bad', defect: 'مغناطيس المحرك مكسور أو تسرب له الماء.', price: 1200 }, { text: 'دوران سلس وبدون صوت احتكاك', status: 'good', defect: '', price: 0 } ] }
        ],
        phone: [
            { title: 'اختبار الشاشة واللمس', icon: 'fa-mobile-screen', instruction: 'ركب الكود *#0*#، افحص الألوان الأساسية، ماذا ترى؟', options: [ { text: 'بقع ميتة أو اللمس متقطع', status: 'bad', defect: 'شاشة غير أصلية.', price: 1500 }, { text: 'ألوان صافية ولمس دقيق', status: 'good', defect: '', price: 0 } ] }
        ],
        pc: [
            { title: 'اللوحة الأم (Motherboard)', icon: 'fa-server', instruction: 'افحص براغي الجهاز من الأسفل. هل هي مخدوشة أو ناقصة؟', options: [ { text: 'براغي مخدوشة/ناقصة', status: 'bad', defect: 'الجهاز تم فتحه وإصلاحه مسبقاً (مجدد).', price: 1000 }, { text: 'براغي سليمة وبختم المصنع', status: 'good', defect: '', price: 0 } ] }
        ]
    };

    function App() {
        const [phase, setPhase] = React.useState(0);
        
        // Search State
        const [searchQuery, setSearchQuery] = React.useState('');
        const [searchResults, setSearchResults] = React.useState([]);

        // Advisor State
        const [needsType, setNeedsType] = React.useState(null); // pc, phone, parts, mobility
        const [inspectStep, setInspectStep] = React.useState(0);
        const [defects, setDefects] = React.useState([]);

        // 1. محرك البحث الذكي
        const handleSearch = (e) => {
            const query = e.target.value.toLowerCase();
            setSearchQuery(query);
            if (query.length > 2) {
                const results = productsDatabase.filter(p => 
                    p.name.toLowerCase().includes(query) || 
                    p.tags.some(tag => tag.toLowerCase().includes(query)) ||
                    p.specs.toLowerCase().includes(query)
                );
                setSearchResults(results);
            } else {
                setSearchResults([]);
            }
        };

        const renderStars = (storeId) => {
            const store = storesDatabase[storeId];
            return (
                <div className="bg-tech-surface p-4 rounded-xl border border-zinc-700 mt-2">
                    <div className="flex justify-between items-center mb-2">
                        <h4 className="font-bold text-white flex items-center gap-2">
                            {store.name} 
                            {store.isWholesale && <span className="bg-red-500/20 text-red-400 text-[10px] px-2 py-0.5 rounded-full border border-red-500/50">بيع بالجملة</span>}
                        </h4>
                        <span className={`text-xs px-2 py-1 rounded-md font-bold ${store.category === 'رسمي' ? 'bg-blue-500/20 text-blue-400' : 'bg-green-500/20 text-green-400'}`}>
                            {store.category}
                        </span>
                    </div>
                    <p className="text-xs text-gray-400 mb-3"><i className="fa-solid fa-location-dot"></i> {store.address}</p>
                    <div className="flex gap-2">
                        <a href={`tel:${store.phone}`} className="flex-1 bg-zinc-800 hover:bg-zinc-700 text-center py-2 rounded-lg text-white text-xs transition"><i className="fa-solid fa-phone text-tech-primary"></i> اتصال</a>
                        <a href={store.map} className="flex-1 bg-zinc-800 hover:bg-zinc-700 text-center py-2 rounded-lg text-white text-xs transition"><i className="fa-solid fa-map-location-dot text-green-500"></i> الخريطة</a>
                        <a href="#" className="flex-1 bg-zinc-800 hover:bg-zinc-700 text-center py-2 rounded-lg text-white text-xs transition"><i className="fa-brands fa-instagram text-purple-500"></i> انستغرام</a>
                    </div>
                </div>
            );
        };

        // 2. الفحص والتفتيش
        const startInspectionFor = (type) => {
            setNeedsType(type);
            setInspectStep(0);
            setDefects([]);
            setPhase(3);
        };

        const handleInspect = (option) => {
            if (option.status === 'bad') setDefects([...defects, option]);
            if (inspectStep < inspectionQuestions[needsType].length - 1) setInspectStep(inspectStep + 1);
            else setInspectStep(99);
        };

        return (
            <div className="min-h-screen flex flex-col font-cairo pb-20 selection:bg-tech-primary selection:text-white">
                
                <nav className="bg-tech-surface border-b border-zinc-800 p-4 sticky top-0 z-50 shadow-lg flex justify-center">
                    <div className="flex items-center gap-2 cursor-pointer" onClick={() => {setPhase(0); setSearchQuery(''); setSearchResults([]);}}>
                        <div className="bg-gradient-to-r from-tech-primary to-tech-secondary p-1.5 rounded-lg text-white">
                            <i className="fa-solid fa-microchip"></i>
                        </div>
                        <h1 className="text-xl font-black text-white tracking-wide">Aura<span className="text-tech-primary">Tech</span> <span className="text-xs bg-red-600 px-1 rounded text-white font-bold ml-1">AI</span></h1>
                    </div>
                </nav>

                <main className="flex-1 container mx-auto p-4 max-w-md">
                    
                    {/* PHASE 0: DASHBOARD */}
                    {phase === 0 && (
                        <div className="flex flex-col items-center mt-6 animate-fade-in space-y-6">
                            
                            {/* Smart Search Bar */}
                            <div className="w-full relative">
                                <i className="fa-solid fa-magnifying-glass absolute right-4 top-4 text-gray-500"></i>
                                <input 
                                    type="text" 
                                    placeholder="ابحث عن هاتف، حاسوب، قطعة، أو دراجة..." 
                                    className="w-full bg-tech-card border border-zinc-700 text-white rounded-2xl py-3 pr-12 pl-4 focus:outline-none focus:border-tech-primary transition shadow-lg"
                                    value={searchQuery}
                                    onChange={handleSearch}
                                />
                                {searchQuery && (
                                    <div className="absolute top-14 left-0 w-full bg-tech-surface border border-zinc-700 rounded-xl shadow-2xl z-50 max-h-96 overflow-y-auto custom-scrollbar p-2">
                                        {searchResults.length > 0 ? searchResults.map(item => (
                                            <div key={item.id} className="p-3 border-b border-zinc-800 last:border-0 hover:bg-zinc-800 rounded-lg transition mb-2">
                                                <div className="flex justify-between items-start">
                                                    <div>
                                                        <h4 className="text-white font-bold">{item.name}</h4>
                                                        <p className="text-xs text-gray-400 mt-1">{item.specs}</p>
                                                    </div>
                                                    <span className="text-tech-primary font-black bg-tech-primary/10 px-2 py-1 rounded">{item.price}</span>
                                                </div>
                                                <div className="mt-3 pt-3 border-t border-zinc-800/50">
                                                    <p className="text-xs text-gray-500 mb-2 font-bold"><i className="fa-solid fa-shop"></i> متوفر في المتاجر التالية:</p>
                                                    {item.storeIds.map(sId => renderStars(sId))}
                                                </div>
                                            </div>
                                        )) : <p className="text-gray-400 text-sm text-center py-4">لم يتم العثور على نتائج.</p>}
                                    </div>
                                )}
                            </div>

                            {/* Main Categories */}
                            {!searchQuery && (
                                <div className="w-full space-y-4">
                                    <h2 className="text-lg font-bold text-white mb-2"><i className="fa-solid fa-stethoscope text-tech-primary"></i> مختبر الفحص التقني (Hardware Clinic)</h2>
                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={() => startInspectionFor('pc')} className="bg-tech-card border border-zinc-800 p-4 rounded-2xl hover:border-tech-primary transition text-center group">
                                            <i className="fa-solid fa-laptop text-3xl text-blue-500 mb-2 group-hover:scale-110 transition"></i><h4 className="font-bold text-white text-sm">حواسيب</h4>
                                        </button>
                                        <button onClick={() => startInspectionFor('phone')} className="bg-tech-card border border-zinc-800 p-4 rounded-2xl hover:border-tech-primary transition text-center group">
                                            <i className="fa-solid fa-mobile text-3xl text-purple-500 mb-2 group-hover:scale-110 transition"></i><h4 className="font-bold text-white text-sm">هواتف ذكية</h4>
                                        </button>
                                        <button onClick={() => startInspectionFor('parts')} className="bg-tech-card border border-zinc-800 p-4 rounded-2xl hover:border-tech-primary transition text-center group relative overflow-hidden">
                                            <div className="absolute top-0 right-0 bg-red-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-bl-lg">جديد</div>
                                            <i className="fa-solid fa-memory text-3xl text-yellow-500 mb-2 group-hover:scale-110 transition"></i><h4 className="font-bold text-white text-sm">قطع غيار</h4>
                                        </button>
                                        <button onClick={() => startInspectionFor('mobility')} className="bg-tech-card border border-zinc-800 p-4 rounded-2xl hover:border-tech-primary transition text-center group relative overflow-hidden">
                                            <div className="absolute top-0 right-0 bg-red-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-bl-lg">جديد</div>
                                            <i className="fa-solid fa-bolt text-3xl text-green-500 mb-2 group-hover:scale-110 transition"></i><h4 className="font-bold text-white text-sm">مركبات كهربائية</h4>
                                        </button>
                                    </div>

                                    <div className="bg-gradient-to-r from-zinc-900 to-tech-card border border-zinc-700 p-6 rounded-3xl mt-6 relative overflow-hidden">
                                        <div className="absolute -left-10 -top-10 text-9xl text-zinc-800/30"><i className="fa-solid fa-map"></i></div>
                                        <h3 className="text-xl font-black text-white relative z-10 mb-2">خريطة الأسواق الشاملة</h3>
                                        <p className="text-sm text-gray-400 relative z-10 mb-4">اكتشف أسواق الجملة، الوكلاء الرسميين، والسوق الموازي في مدينتك.</p>
                                        <button onClick={() => setPhase(4)} className="relative z-10 w-full bg-white text-black font-black py-3 rounded-xl hover:bg-gray-200 transition shadow-lg">تصفح الخريطة الدقيقة</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* PHASE 3: INSPECTION */}
                    {phase === 3 && (
                        <div className="animate-slide-up mt-4">
                            <div className="text-center mb-6">
                                <span className="bg-yellow-500/20 text-yellow-500 font-bold px-3 py-1 rounded-full text-xs">مختبر الفحص الميداني</span>
                                <h2 className="text-2xl font-black text-white mt-3">بروتوكول فحص الـ {needsType.toUpperCase()}</h2>
                            </div>

                            {inspectStep < 99 ? (
                                <div className="bg-tech-card border border-zinc-800 rounded-3xl p-6 shadow-2xl animate-fade-in">
                                    <div className="flex flex-col items-center mb-6 text-center">
                                        <div className="w-16 h-16 bg-tech-surface rounded-full flex items-center justify-center text-3xl mb-3 border border-yellow-600/30 text-yellow-500">
                                            <i className={`fa-solid ${inspectionQuestions[needsType][inspectStep].icon}`}></i>
                                        </div>
                                        <h3 className="text-lg font-bold text-white">{inspectionQuestions[needsType][inspectStep].title}</h3>
                                        <p className="text-yellow-200 bg-yellow-900/20 p-3 rounded-lg text-sm mt-4 border border-yellow-900/50">
                                            {inspectionQuestions[needsType][inspectStep].instruction}
                                        </p>
                                    </div>

                                    <div className="grid gap-3">
                                        {inspectionQuestions[needsType][inspectStep].options.map((opt, i) => (
                                            <button key={i} onClick={() => handleInspect(opt)} className="w-full bg-tech-surface hover:bg-zinc-800 text-white p-4 rounded-xl border border-zinc-700 font-bold text-right flex justify-between items-center group transition">
                                                <span>{opt.text}</span><i className="fa-solid fa-chevron-left text-gray-600 group-hover:text-yellow-500"></i>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                <div className="animate-fade-in space-y-4">
                                    {defects.length === 0 ? (
                                        <div className="bg-green-900/20 border border-green-600/50 p-6 rounded-2xl text-center">
                                            <i className="fa-solid fa-shield-check text-5xl text-green-500 mb-3"></i>
                                            <h4 className="text-xl font-bold text-white mb-2">القطعة سليمة 100%!</h4>
                                            <p className="text-green-200 text-sm">يمكنك الشراء باطمئنان.</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-3">
                                            <div className="bg-red-900/20 border border-red-900/50 p-4 rounded-xl text-center">
                                                <h4 className="text-red-500 font-black text-lg"><i className="fa-solid fa-triangle-exclamation"></i> احذر! قطعة تالفة أو مزورة</h4>
                                            </div>
                                            {defects.map((def, i) => (
                                                <div key={i} className="bg-tech-surface p-4 rounded-xl border-r-4 border-red-500 flex justify-between items-center">
                                                    <p className="text-sm font-bold text-white">{def.defect}</p>
                                                    <span className="text-xs bg-red-900/50 text-red-200 px-2 py-1 rounded font-bold">خسارة {def.price} DH</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                    <button onClick={() => setPhase(0)} className="w-full bg-tech-surface border border-zinc-700 text-white font-bold py-4 rounded-xl mt-4 hover:bg-zinc-800">العودة للرئيسية</button>
                                </div>
                            )}
                        </div>
                    )}

                    {/* PHASE 4: STORES MAP */}
                    {phase === 4 && (
                        <div className="animate-slide-up mt-4 space-y-4">
                            <h2 className="text-2xl font-black text-white text-center mb-6">خريطة الأسواق (GPS)</h2>
                            {Object.keys(storesDatabase).map(key => renderStars(key))}
                            <button onClick={() => setPhase(0)} className="w-full bg-white text-black font-bold py-3 rounded-xl mt-4">العودة للرئيسية</button>
                        </div>
                    )}

                </main>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

</script>
</body>
</html>
