<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTA Mapping Engine | Fixed Demo</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="root" class="flex h-screen items-center justify-center text-white">
        <div class="text-center">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500 mb-4"></i>
            <h2 class="text-xl font-bold">Initializing System...</h2>
            <p class="text-slate-400 text-sm mt-2">Connecting to Libraries...</p>
        </div>
    </div>

    <script type="text/babel">

        // --- 1. DATA ---
        const RAW_INVENTORY = [
            { source: 'Hotelbeds', id: 'HB_101', name: 'The Ritz-Carlton Riyadh', lat: 24.6650, lng: 46.6800, price: 1800, rating: 5, image: 'https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=300&q=80' },
            { source: 'Expedia',   id: 'EPS_99', name: 'Ritz Carlton Hotel - Riyadh', lat: 24.6652, lng: 46.6801, price: 1950, rating: 5, image: '' },
            { source: 'Hotelbeds', id: 'HB_202', name: 'Narcissus Hotel & SPA Riyadh', lat: 24.6900, lng: 46.6850, price: 1200, rating: 5, image: 'https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?auto=format&fit=crop&w=300&q=80' },
            { source: 'RateHawk',  id: 'RH_555', name: 'Narcissus Hotel',              lat: 24.6901, lng: 46.6851, price: 1150, rating: 4, image: '' },
            { source: 'TBO',       id: 'TBO_12', name: 'The Narcissus Riyadh',         lat: 24.6899, lng: 46.6849, price: 1300, rating: 5, image: '' },
            { source: 'WebBeds',   id: 'WB_777', name: 'Braira Al Olaya',              lat: 24.6950, lng: 46.6900, price: 600,  rating: 4, image: 'https://images.unsplash.com/photo-1611892440504-42a792e24d32?auto=format&fit=crop&w=300&q=80' }
        ];

        // --- 2. LOGIC ---
        const getGeoDistance = (lat1, lon1, lat2, lon2) => {
            const R = 6371e3; 
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        };

        const getSimilarityScore = (s1, s2) => {
            let longer = s1.toLowerCase().replace(/hotel|the|resort/g, "").trim();
            let shorter = s2.toLowerCase().replace(/hotel|the|resort/g, "").trim();
            if (s1.length < s2.length) { [longer, shorter] = [shorter, longer]; }
            let longerLength = longer.length;
            if (longerLength == 0) return 1.0;
            
            const costs = new Array();
            for (let i = 0; i <= longer.length; i++) {
                let lastValue = i;
                for (let j = 0; j <= shorter.length; j++) {
                    if (i == 0) costs[j] = j;
                    else {
                        if (j > 0) {
                            let newValue = costs[j - 1];
                            if (longer.charAt(i - 1) != shorter.charAt(j - 1)) newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                            costs[j - 1] = lastValue;
                            lastValue = newValue;
                        }
                    }
                }
                if (i > 0) costs[shorter.length] = lastValue;
            }
            return (longerLength - costs[shorter.length]) / parseFloat(longerLength);
        };

        // --- 3. COMPONENT ---
        const App = () => {
            const [logs, setLogs] = React.useState([]);
            const [mappedHotels, setMappedHotels] = React.useState([]);
            const [processing, setProcessing] = React.useState(false);
            const [showPayment, setShowPayment] = React.useState(null);

            const addLog = (service, message) => {
                const colors = { 'LARAVEL': 'text-red-400', 'REDIS': 'text-green-400', 'ELASTIC': 'text-yellow-400', 'MAPPING': 'text-blue-400' };
                setLogs(prev => [...prev, { time: new Date().toLocaleTimeString(), service, message, color: colors[service] }]);
            };

            const startEngine = async () => {
                setProcessing(true);
                setLogs([]);
                setMappedHotels([]);

                addLog('LARAVEL', 'System Init... Loading Modules');
                await new Promise(r => setTimeout(r, 500));
                addLog('REDIS', 'Connecting to Queue Worker: default');
                await new Promise(r => setTimeout(r, 500));

                let finalMap = [];
                let processedIds = new Set();

                for (let i = 0; i < RAW_INVENTORY.length; i++) {
                    const candidate = RAW_INVENTORY[i];
                    if (processedIds.has(candidate.id)) continue;

                    addLog('MAPPING', `Processing: ${candidate.name}`);
                    let masterHotel = { ...candidate, sources: [candidate], lowestPrice: candidate.price, provider: candidate.source };
                    processedIds.add(candidate.id);

                    for (let j = i + 1; j < RAW_INVENTORY.length; j++) {
                        const compare = RAW_INVENTORY[j];
                        if (processedIds.has(compare.id)) continue;

                        const distance = getGeoDistance(candidate.lat, candidate.lng, compare.lat, compare.lng);
                        if (distance < 100) { 
                            const similarity = getSimilarityScore(candidate.name, compare.name);
                            if (similarity > 0.70) {
                                addLog('MAPPING', `>> MATCH: ${compare.name} (${Math.round(similarity*100)}%)`);
                                masterHotel.sources.push(compare);
                                processedIds.add(compare.id);
                                if (compare.price < masterHotel.lowestPrice) {
                                    masterHotel.lowestPrice = compare.price;
                                    masterHotel.provider = compare.source;
                                }
                            }
                        }
                    }
                    finalMap.push(masterHotel);
                    await new Promise(r => setTimeout(r, 200));
                }
                
                addLog('LARAVEL', 'Job Completed.');
                setMappedHotels(finalMap);
                setProcessing(false);
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    
                    {/* Sidebar */}
                    <div className="w-full md:w-1/3 bg-slate-900 p-4 border-r border-slate-700 flex flex-col">
                        <div className="mb-4">
                            <h2 className="text-xl font-bold text-white"><i className="fa-solid fa-server mr-2"></i>Backend Core</h2>
                        </div>
                        <div className="grid grid-cols-2 gap-2 mb-4">
                            <div className="bg-slate-800 p-2 rounded text-center border border-slate-700">
                                <div className="text-red-500 font-bold text-sm">Laravel 11</div>
                            </div>
                            <div className="bg-slate-800 p-2 rounded text-center border border-slate-700">
                                <div className="text-yellow-500 font-bold text-sm">Elasticsearch</div>
                            </div>
                            <div className="bg-slate-800 p-2 rounded text-center border border-slate-700">
                                <div className="text-green-500 font-bold text-sm">Redis</div>
                            </div>
                            <div className="bg-slate-800 p-2 rounded text-center border border-slate-700">
                                <div className="text-blue-500 font-bold text-sm">RabbitMQ</div>
                            </div>
                        </div>
                        <div className="flex-grow bg-black rounded p-3 font-mono text-xs overflow-y-auto border border-slate-700 h-64 md:h-auto">
                             {logs.length === 0 && <span className="text-slate-600">Waiting for jobs...</span>}
                             {logs.map((log, idx) => (
                                <div key={idx}><span className="text-slate-500">[{log.time}]</span> <span className={log.color}>{log.service}:</span> {log.message}</div>
                             ))}
                        </div>
                        <button onClick={startEngine} disabled={processing} className={`mt-4 w-full py-3 rounded font-bold text-white ${processing ? 'bg-slate-600' : 'bg-blue-600 hover:bg-blue-500'}`}>
                            {processing ? 'Processing...' : 'Start Engine'}
                        </button>
                    </div>

                    {/* Main Content */}
                    <div className="w-full md:w-2/3 p-6 bg-slate-900 overflow-y-auto">
                        <h1 className="text-3xl font-bold text-white mb-6">Riyadh Stays <span className="text-blue-500">.sa</span></h1>
                        
                        {mappedHotels.length === 0 ? (
                            <div className="text-center py-20 opacity-50 text-white">
                                <i className="fa-solid fa-layer-group text-6xl mb-4"></i>
                                <p>Inventory Empty. Run the Engine.</p>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                {mappedHotels.map((hotel, idx) => (
                                    <div key={idx} className="glass-panel rounded-xl p-4 flex flex-col sm:flex-row gap-4">
                                        <div className="sm:w-32 h-24 bg-slate-700 rounded relative overflow-hidden">
                                            {hotel.image && <img src={hotel.image} className="w-full h-full object-cover"/>}
                                        </div>
                                        <div className="flex-grow">
                                            <h3 className="text-xl font-bold text-white">{hotel.name}</h3>
                                            <div className="flex gap-2 mt-2">
                                                {hotel.sources.map((s, i) => (
                                                    <span key={i} className="px-2 py-1 rounded text-xs border border-slate-600 text-slate-300 bg-slate-800">{s.source}</span>
                                                ))}
                                            </div>
                                            <div className="mt-2 flex justify-between items-center">
                                                <div className="text-xs text-slate-400">Fulfilled by: {hotel.provider}</div>
                                                <div className="text-right">
                                                    <span className="text-xl font-bold text-white">{hotel.lowestPrice} SAR</span>
                                                    <button onClick={() => setShowPayment(hotel)} className="ml-3 bg-blue-600 text-white px-3 py-1 rounded text-sm">Book</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Payment Modal */}
                    {showPayment && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-lg p-6 max-w-sm w-full text-slate-900">
                                <h3 className="font-bold text-lg mb-4">Payment (Mada)</h3>
                                <div className="bg-slate-100 p-3 rounded mb-4 text-sm">
                                    Booking: <b>{showPayment.name}</b><br/>
                                    Total: <b>{showPayment.lowestPrice} SAR</b>
                                </div>
                                <button className="w-full border-2 border-blue-500 bg-blue-50 p-2 rounded mb-2 flex items-center justify-center font-bold text-blue-800">
                                    Pay with Mada
                                </button>
                                <button onClick={() => setShowPayment(null)} className="w-full text-slate-500 mt-2 text-sm">Cancel</button>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>
