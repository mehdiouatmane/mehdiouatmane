<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise OTA Engine | Hybrid Mapping Demo</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .terminal { font-family: 'Courier New', Courier, monospace; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        
        /* Simulation Mada Logo */
        .mada-logo {
            background: linear-gradient(to right, #005d6e, #00aeb6);
            color: white; font-weight: bold; font-style: italic; padding: 2px 8px; border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">

        // =========================================================================
        // 1. DATA SIMULATION (MOCK SUPPLIERS)
        // لاحظ الفوضى في البيانات (Duplicate, different names, coordinates drift)
        // =========================================================================
        const RAW_INVENTORY = [
            // --- CASE 1: The Ritz-Carlton (Identical mostly) ---
            { source: 'Hotelbeds', id: 'HB_101', name: 'The Ritz-Carlton Riyadh', lat: 24.6650, lng: 46.6800, price: 1800, rating: 5, image: 'https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=300&q=80' },
            { source: 'Expedia',   id: 'EPS_99', name: 'Ritz Carlton Hotel - Riyadh', lat: 24.6652, lng: 46.6801, price: 1950, rating: 5, image: '' }, // Coordinates drift slightly
            
            // --- CASE 2: Narcissus (Different Naming Convention) ---
            { source: 'Hotelbeds', id: 'HB_202', name: 'Narcissus Hotel & SPA Riyadh', lat: 24.6900, lng: 46.6850, price: 1200, rating: 5, image: 'https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?auto=format&fit=crop&w=300&q=80' },
            { source: 'RateHawk',  id: 'RH_555', name: 'Narcissus Hotel',              lat: 24.6901, lng: 46.6851, price: 1150, rating: 4, image: '' },
            { source: 'TBO',       id: 'TBO_12', name: 'The Narcissus Riyadh',         lat: 24.6899, lng: 46.6849, price: 1300, rating: 5, image: '' },

            // --- CASE 3: Unique Hotel (No Duplicates) ---
            { source: 'WebBeds',   id: 'WB_777', name: 'Braira Al Olaya',              lat: 24.6950, lng: 46.6900, price: 600,  rating: 4, image: 'https://images.unsplash.com/photo-1611892440504-42a792e24d32?auto=format&fit=crop&w=300&q=80' }
        ];

        // =========================================================================
        // 2. THE ALGORITHMS (The Core "Boss" Logic)
        // =========================================================================

        // Haversine Formula: حساب المسافة الجغرافية بين نقطتين (للمرحلة الأولى من الفلترة)
        const getGeoDistance = (lat1, lon1, lat2, lon2) => {
            const R = 6371e3; // metres
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; // Distance in meters
        };

        // Levenshtein Distance: حساب نسبة تشابه النصوص (للمرحلة الثانية)
        const getSimilarityScore = (s1, s2) => {
            let longer = s1.toLowerCase().replace(/hotel|the|resort/g, "").trim();
            let shorter = s2.toLowerCase().replace(/hotel|the|resort/g, "").trim();
            if (s1.length < s2.length) { longer = s2; shorter = s1; }
            let longerLength = longer.length;
            if (longerLength == 0) return 1.0;
            
            const costs = new Array();
            for (let i = 0; i <= longer.length; i++) {
                let lastValue = i;
                for (let j = 0; j <= shorter.length; j++) {
                    if (i == 0) costs[j] = j;
                    else {
                        if (j > 0) {
                            let newValue = costs[j - 1];
                            if (longer.charAt(i - 1) != shorter.charAt(j - 1)) newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                            costs[j - 1] = lastValue;
                            lastValue = newValue;
                        }
                    }
                }
                if (i > 0) costs[shorter.length] = lastValue;
            }
            return (longerLength - costs[shorter.length]) / parseFloat(longerLength);
        };

        // =========================================================================
        // 3. REACT COMPONENTS
        // =========================================================================

        const App = () => {
            const [logs, setLogs] = React.useState([]);
            const [mappedHotels, setMappedHotels] = React.useState([]);
            const [processing, setProcessing] = React.useState(false);
            const [view, setView] = React.useState('dashboard'); // dashboard | search
            const [showPayment, setShowPayment] = React.useState(null);

            // Function to simulate Backend Logs (Laravel/Redis/Elastic)
            const addLog = (service, message) => {
                const colors = { 'LARAVEL': 'text-red-400', 'REDIS': 'text-green-400', 'ELASTIC': 'text-yellow-400', 'MAPPING': 'text-blue-400' };
                setLogs(prev => [...prev, { time: new Date().toLocaleTimeString(), service, message, color: colors[service] }]);
                const terminal = document.getElementById('terminal-body');
                if(terminal) terminal.scrollTop = terminal.scrollHeight;
            };

            // THE MAIN PROCESS: Hybrid Mapping Engine
            const startEngine = async () => {
                setProcessing(true);
                setLogs([]);
                setMappedHotels([]);

                addLog('LARAVEL', 'System Init... Loading Modules');
                await new Promise(r => setTimeout(r, 500));
                addLog('REDIS', 'Connecting to Queue Worker: default');
                addLog('LARAVEL', `Fetching Inventory from 5 Suppliers... (${RAW_INVENTORY.length} records found)`);
                await new Promise(r => setTimeout(r, 800));

                let finalMap = [];
                let processedIds = new Set();

                // Start looping (The Logic)
                for (let i = 0; i < RAW_INVENTORY.length; i++) {
                    const candidate = RAW_INVENTORY[i];
                    if (processedIds.has(candidate.id)) continue;

                    addLog('MAPPING', `Processing Candidate: [${candidate.source}] ${candidate.name}`);
                    
                    // Create a new "Master Hotel"
                    let masterHotel = { ...candidate, sources: [candidate], lowestPrice: candidate.price, provider: candidate.source };
                    processedIds.add(candidate.id);

                    // Search for duplicates in the remaining list
                    for (let j = i + 1; j < RAW_INVENTORY.length; j++) {
                        const compare = RAW_INVENTORY[j];
                        if (processedIds.has(compare.id)) continue;

                        // STEP 1: GEO-FENCING (The "Fast" Filter)
                        const distance = getGeoDistance(candidate.lat, candidate.lng, compare.lat, compare.lng);
                        
                        if (distance < 100) { // If closer than 100 meters
                            // STEP 2: STRING SIMILARITY (The "Accurate" Filter)
                            const similarity = getSimilarityScore(candidate.name, compare.name);
                            
                            if (similarity > 0.70) { // 70% Match threshold
                                addLog('MAPPING', `>> MATCH FOUND! Distance: ${Math.round(distance)}m, Similarity: ${(similarity*100).toFixed(0)}%`);
                                addLog('MAPPING', `>> Merging [${compare.source}] into Master ID`);
                                
                                // Merge Logic
                                masterHotel.sources.push(compare);
                                processedIds.add(compare.id);
                                
                                // Price Logic: Keep the lowest
                                if (compare.price < masterHotel.lowestPrice) {
                                    masterHotel.lowestPrice = compare.price;
                                    masterHotel.provider = compare.source; // Switch provider to the cheaper one
                                }
                            }
                        }
                    }
                    
                    finalMap.push(masterHotel);
                    addLog('ELASTIC', `Indexing Master Hotel: ${masterHotel.name} (ID: ${masterHotel.id})`);
                    await new Promise(r => setTimeout(r, 300)); // Delay for effect
                }

                addLog('REDIS', 'Caching results for 15 minutes (TTL: 900)');
                addLog('LARAVEL', 'Job Completed Successfully.');
                setMappedHotels(finalMap);
                setProcessing(false);
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    
                    {/* LEFT SIDEBAR: TECH STACK VISUALIZER */}
                    <div className="w-full md:w-1/3 bg-slate-900 p-4 border-r border-slate-700 flex flex-col">
                        <div className="mb-6">
                            <h2 className="text-xl font-bold text-white mb-2"><i className="fa-solid fa-server mr-2"></i>Backend Core</h2>
                            <p className="text-xs text-slate-400">Architecture Simulation</p>
                        </div>

                        {/* Tech Badges */}
                        <div className="grid grid-cols-2 gap-2 mb-6">
                            <div className="bg-slate-800 p-2 rounded border border-slate-700 text-center">
                                <div className="text-red-500 font-bold text-sm">Laravel 11</div>
                                <div className="text-xs text-slate-500">API Gateway</div>
                            </div>
                            <div className="bg-slate-800 p-2 rounded border border-slate-700 text-center">
                                <div className="text-yellow-500 font-bold text-sm">Elasticsearch</div>
                                <div className="text-xs text-slate-500">NoSQL Engine</div>
                            </div>
                            <div className="bg-slate-800 p-2 rounded border border-slate-700 text-center">
                                <div className="text-green-500 font-bold text-sm">Redis</div>
                                <div className="text-xs text-slate-500">Queue & Cache</div>
                            </div>
                            <div className="bg-slate-800 p-2 rounded border border-slate-700 text-center">
                                <div className="text-blue-500 font-bold text-sm">RabbitMQ</div>
                                <div className="text-xs text-slate-500">Jobs</div>
                            </div>
                        </div>

                        {/* Terminal Log */}
                        <div className="flex-grow bg-black rounded-lg p-3 font-mono text-xs overflow-hidden flex flex-col border border-slate-700 shadow-inner">
                            <div className="text-slate-500 border-b border-slate-800 pb-2 mb-2">root@server:~/ota-engine# php artisan horizon</div>
                            <div id="terminal-body" className="flex-grow overflow-y-auto space-y-1">
                                {logs.length === 0 && <span className="text-slate-600">Waiting for job dispatch...</span>}
                                {logs.map((log, idx) => (
                                    <div key={idx}>
                                        <span className="text-slate-500">[{log.time}]</span> <span className={log.color}>{log.service}:</span> {log.message}
                                    </div>
                                ))}
                                {processing && <div className="text-white blink">_</div>}
                            </div>
                        </div>

                        <button 
                            onClick={startEngine} 
                            disabled={processing}
                            className={`mt-4 w-full py-3 rounded font-bold text-white transition ${processing ? 'bg-slate-600 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-500 shadow-lg shadow-blue-500/30'}`}
                        >
                            {processing ? <><i className="fa-solid fa-gear fa-spin mr-2"></i> Processing Mappings...</> : <><i className="fa-solid fa-play mr-2"></i> Start Mapping Engine</>}
                        </button>
                    </div>

                    {/* RIGHT CONTENT: CLIENT VIEW */}
                    <div className="w-full md:w-2/3 p-6 overflow-y-auto relative">
                        
                        <div className="flex justify-between items-center mb-8">
                            <div>
                                <h1 className="text-3xl font-bold text-white">Riyadh Stays <span className="text-blue-500">.sa</span></h1>
                                <p className="text-slate-400 text-sm">Unified B2C Booking Platform</p>
                            </div>
                            <div className="text-right">
                                <span className="px-3 py-1 bg-green-900 text-green-300 rounded-full text-xs font-mono">System Status: ONLINE</span>
                            </div>
                        </div>

                        {/* Results Area */}
                        {mappedHotels.length === 0 ? (
                            <div className="text-center py-20 opacity-50">
                                <i className="fa-solid fa-layer-group text-6xl text-slate-600 mb-4"></i>
                                <h3 className="text-xl text-slate-300">Inventory Empty</h3>
                                <p>Run the Mapping Engine to fetch and unify data.</p>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                <div className="flex justify-between items-end border-b border-slate-700 pb-2">
                                    <h2 className="text-xl text-white">Search Results</h2>
                                    <span className="text-slate-400 text-sm">{mappedHotels.length} unique hotels found (from {RAW_INVENTORY.length} sources)</span>
                                </div>

                                {mappedHotels.map((hotel, idx) => (
                                    <div key={idx} className="glass-panel rounded-xl p-4 flex flex-col md:flex-row gap-4 hover:bg-slate-800 transition">
                                        {/* Image */}
                                        <div className="md:w-1/3 h-40 rounded-lg overflow-hidden bg-slate-700 relative">
                                            {hotel.image ? <img src={hotel.image} className="w-full h-full object-cover" /> : <div className="flex items-center justify-center h-full text-slate-500"><i className="fa-solid fa-image text-3xl"></i></div>}
                                            <div className="absolute top-2 left-2 bg-black/70 text-white text-xs px-2 py-1 rounded backdrop-blur-sm">
                                                <i className="fa-solid fa-location-dot text-red-400 mr-1"></i> Riyadh
                                            </div>
                                        </div>

                                        {/* Content */}
                                        <div className="md:w-2/3 flex flex-col justify-between">
                                            <div>
                                                <div className="flex justify-between items-start">
                                                    <h3 className="text-xl font-bold text-white">{hotel.name}</h3>
                                                    <div className="flex text-yellow-500 text-xs">
                                                        {[...Array(hotel.rating)].map((_,i) => <i key={i} className="fa-solid fa-star"></i>)}
                                                    </div>
                                                </div>
                                                
                                                {/* Mapping Proof (Suppliers Badges) */}
                                                <div className="mt-3">
                                                    <p className="text-xs text-slate-400 mb-1 uppercase tracking-wider">Available inventory sources:</p>
                                                    <div className="flex flex-wrap gap-2">
                                                        {hotel.sources.map((s, i) => (
                                                            <span key={i} title={`${s.name} (${s.price} SAR)`} className={`px-2 py-1 rounded text-xs border ${s.source === hotel.provider ? 'bg-green-900/50 border-green-500 text-green-300' : 'bg-slate-700 border-slate-600 text-slate-300'}`}>
                                                                {s.source} {s.source === hotel.provider && <i className="fa-solid fa-check ml-1"></i>}
                                                            </span>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="mt-4 flex justify-between items-end border-t border-slate-700 pt-3">
                                                <div className="text-xs text-slate-400">
                                                    Fulfilled by: <span className="font-bold text-white">{hotel.provider}</span>
                                                </div>
                                                <div className="text-right">
                                                    <div className="text-2xl font-bold text-white">{hotel.lowestPrice} <span className="text-sm font-normal text-slate-400">SAR</span></div>
                                                    <button 
                                                        onClick={() => setShowPayment(hotel)}
                                                        className="mt-1 bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded text-sm font-bold transition"
                                                    >
                                                        Book Now
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* PAYMENT MODAL (MADA) */}
                    {showPayment && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-xl max-w-md w-full p-6 text-slate-900 relative">
                                <button onClick={() => setShowPayment(null)} className="absolute top-4 right-4 text-slate-400 hover:text-red-500"><i className="fa-solid fa-times text-xl"></i></button>
                                
                                <h3 className="text-lg font-bold mb-4">Confirm Reservation</h3>
                                <div className="bg-slate-100 p-4 rounded mb-4">
                                    <div className="font-bold">{showPayment.name}</div>
                                    <div className="text-sm text-slate-600">1 Night, Standard Room</div>
                                    <div className="flex justify-between mt-2 font-bold text-blue-600 border-t border-slate-200 pt-2">
                                        <span>Total</span>
                                        <span>{showPayment.lowestPrice} SAR</span>
                                    </div>
                                </div>

                                <div className="space-y-3">
                                    <p className="text-sm font-semibold">Select Payment Method:</p>
                                    
                                    <button className="w-full border-2 border-blue-500 bg-blue-50 p-3 rounded flex items-center justify-between">
                                        <div className="flex items-center gap-2">
                                            <span className="mada-logo text-lg">mada</span>
                                            <span className="text-sm font-bold text-slate-700">Debit Card</span>
                                        </div>
                                        <i className="fa-solid fa-circle-check text-blue-500"></i>
                                    </button>

                                    <button className="w-full border border-slate-200 p-3 rounded flex items-center gap-2 opacity-50 cursor-not-allowed">
                                        <i className="fa-brands fa-cc-visa text-xl"></i>
                                        <span className="text-sm">Credit Card</span>
                                    </button>
                                </div>

                                <button onClick={() => { alert('Payment via Mada API Successful! \nWebhook Received via Laravel Cashier.'); setShowPayment(null); }} className="w-full bg-blue-600 text-white font-bold py-3 rounded mt-6 hover:bg-blue-700">
                                    Pay {showPayment.lowestPrice} SAR
                                </button>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>
