<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TechCheck SaaS - فحص الهواتف والحواسيب</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tech: { dark: '#0A0A0B', primary: '#3B82F6', secondary: '#8B5CF6', surface: '#18181B' },
                        status: { good: '#10B981', bad: '#EF4444', warn: '#F59E0B' }
                    },
                    fontFamily: { cairo: ['Cairo', 'sans-serif'] },
                    animation: { 'fade-in': 'fadeIn 0.4s ease-out', 'slide-up': 'slideUp 0.4s ease-out' },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; background-color: #0A0A0B; color: white; }</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">

    // ================== 1. بيانات فحص الهاتف ==================
    const phoneInspection = [
        {
            id: 'p1', title: 'فحص الشاشة المخفي (Samsung)', icon: 'fa-mobile-screen',
            instruction: 'ركب الكود *#0*# وجرب الألوان (أحمر، أخضر، أزرق) واللمس (Touch).',
            options: [
                { text: 'كاين بقع ميتة أو اللمس ثقيل', status: 'bad', result: 'الشاشة مبدلة أو خاسرة.', advice: 'الشاشة هي أغلى حاجة، هرب!', price: 1500 },
                { text: 'الألوان صافية واللمس خفيف', status: 'good', result: 'الشاشة أصلية وممتازة.', advice: 'الشاشة مزيانة.', price: 0 }
            ]
        },
        {
            id: 'p2', title: 'الشبكة والـ IMEI', icon: 'fa-signal',
            instruction: 'ركب *#06# وقارن الرقم مع الكرطونة، ودير كارطة وجرب 4G/5G.',
            options: [
                { text: 'الأرقام مبدلة / مكاينش ريزو', status: 'bad', result: 'هاتف مسروق أو فيه مشكل Modem.', advice: 'مشكل فـ RF Circuit أو بلاكليست.', price: 800 },
                { text: 'الرقم مطابق والريزو طالع', status: 'good', result: 'الهاتف قانوني (Clean).', advice: 'الموديم خدام.', price: 0 }
            ]
        },
        {
            id: 'p3', title: 'البطارية والشحن السريع', icon: 'fa-battery-half',
            instruction: 'خدم فيديو 4K فاليوتوب 10 دقايق، وشوف شحال نقصات.',
            options: [
                { text: 'نقصات كثر من 8% أو طفا', status: 'bad', result: 'البطارية عيانة (Degraded).', advice: 'خاصك تنقص ثمن باتري جديد.', price: 300 },
                { text: 'نقصات 2% لـ 4% كحد أقصى', status: 'good', result: 'البطارية ممتازة.', advice: 'خلايا البطارية صحيحة.', price: 0 }
            ]
        }
    ];

    // ================== 2. بيانات فحص الحاسوب ==================
    const pcInspection = [
        {
            id: 'c1', title: 'الحرارة والمعالج (CPU)', icon: 'fa-microchip',
            instruction: 'خدم برنامج Cinebench R23 أو Prime95 لمدة 10 دقايق، وراقب بـ HWMonitor.',
            options: [
                { text: 'الحرارة فاتت 95° أو طفا البيسي', status: 'bad', result: 'مشكل تبريد (Thermal Throttling).', advice: 'المعجون الحراري ناشف أو الفرافر ميتين.', price: 400 },
                { text: 'الحرارة مستقرة تحت 85°', status: 'good', result: 'التبريد ممتاز.', advice: 'المعالج كيعطي الجهد كامل.', price: 0 }
            ]
        },
        {
            id: 'c2', title: 'كارت الشاشة (GPU)', icon: 'fa-memory',
            instruction: 'خدم برنامج FurMark على دقة 1080p لمدة 10 دقايق.',
            options: [
                { text: 'بانت خطوط (Artifacts) أو تبلوكا', status: 'bad', result: 'الكارت جرافيك كتحتضر.', advice: 'هذا أخطر مشكل فالبيسي، لا تشتريه!', price: 2000 },
                { text: 'الصورة نقية والـ FPS طالع', status: 'good', result: 'الكارت جرافيك صحيحة.', advice: 'VRAM و GPU فحالة جيدة.', price: 0 }
            ]
        },
        {
            id: 'c3', title: 'صحة التخزين (SSD)', icon: 'fa-hard-drive',
            instruction: 'خدم برنامج CrystalDiskInfo وشوف الحالة (Health).',
            options: [
                { text: 'الحالة Caution أو Bad', status: 'warn', result: 'الديسك قريب يموت.', advice: 'عمر الديسك سالا (TBW طالع).', price: 600 },
                { text: 'الحالة Good (100%)', status: 'good', result: 'التخزين سليم.', advice: 'الديسك باقي جديد.', price: 0 }
            ]
        },
        {
            id: 'c4', title: 'البطارية (Battery Report)', icon: 'fa-plug',
            instruction: 'افتح CMD واكتب: powercfg /batteryreport وشوف Design Capacity مقابل Full Charge.',
            options: [
                { text: 'القدرة نزلت تحت 70%', status: 'bad', result: 'بطارية ميتة.', advice: 'البيسي ماغيشدش الشارج بلا كابل.', price: 800 },
                { text: 'القدرة فوق 85%', status: 'good', result: 'بطارية ممتازة.', advice: 'دورة الحياة باقا طويلة.', price: 0 }
            ]
        }
    ];

    // ================== 3. أسرار السوق (الأسعار الحقيقية) ==================
    const marketSecrets = [
        { 
            title: 'الهواتف (مثال: Samsung)', 
            factory: '700 درهم (تكلفة المصنع بفيتنام/الهند)',
            dubai: '800 - 900 درهم (سوق موازي / دبي JAFZA)',
            official: '1350 درهم (موزع رسمي مغربي + ضرائب + ضمان)'
        },
        {
            title: 'مسار الحواسيب (Grey Market)',
            details: 'السلعة كتجي من Miami، Hong Kong، أو دبي (Redington, Ingram Micro). كتدخل عبر سبتة، مليلية، أو الكركرات (بدون رسوم جمركية). هادشي علاش البيسي فدرب غلف رخص من Marjane بـ 30%.'
        }
    ];

    function App() {
        const [view, setView] = React.useState('home');
        const [deviceType, setDeviceType] = React.useState(null); // 'phone' or 'pc'
        const [currentStep, setCurrentStep] = React.useState(0);
        const [stepResult, setStepResult] = React.useState(null);
        const [defects, setDefects] = React.useState([]);

        const activeInspection = deviceType === 'phone' ? phoneInspection : pcInspection;

        const startInspection = (type) => {
            setDeviceType(type);
            setCurrentStep(0);
            setStepResult(null);
            setDefects([]);
            setView('inspection');
        };

        const handleAnswer = (option) => {
            setStepResult(option);
            if (option.status !== 'good') {
                const currentData = activeInspection[currentStep];
                setDefects([...defects, { title: currentData.title, ...option }]);
            }
        };

        const nextStep = () => {
            setStepResult(null);
            if (currentStep < activeInspection.length - 1) {
                setCurrentStep(currentStep + 1);
            } else {
                setView('report');
            }
        };

        return (
            <div className="min-h-screen flex flex-col font-cairo pb-20">
                {/* Navbar */}
                <nav className="bg-tech-surface border-b border-gray-800 p-4 sticky top-0 z-50 flex justify-between items-center shadow-2xl">
                    <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('home')}>
                        <div className="bg-gradient-to-r from-tech-primary to-tech-secondary p-1.5 rounded-lg text-white">
                            <i className="fa-solid fa-shield-halved"></i>
                        </div>
                        <h1 className="text-xl font-black text-white tracking-wide">Tech<span className="text-tech-primary">Check</span></h1>
                    </div>
                    {view !== 'home' && <button onClick={() => setView('home')} className="text-gray-400 hover:text-white"><i className="fa-solid fa-house"></i></button>}
                </nav>

                <main className="flex-1 container mx-auto p-4 max-w-md">
                    
                    {/* --- الصفحة الرئيسية --- */}
                    {view === 'home' && (
                        <div className="flex flex-col items-center justify-center mt-8 animate-fade-in space-y-8">
                            <div className="text-center">
                                <h2 className="text-3xl font-black text-white mb-2">شري بلا ماتصيد!</h2>
                                <p className="text-gray-400 text-sm">افحص الأجهزة بحال الخبراء واعرف الأثمنة الحقيقية.</p>
                            </div>
                            
                            <div className="grid grid-cols-2 gap-4 w-full">
                                <div onClick={() => startInspection('phone')} className="bg-tech-surface border border-gray-800 rounded-2xl p-6 flex flex-col items-center cursor-pointer hover:border-tech-primary transition group">
                                    <i className="fa-solid fa-mobile-screen-button text-4xl text-tech-primary mb-3 group-hover:scale-110 transition-transform"></i>
                                    <h3 className="font-bold text-white">فحص هاتف</h3>
                                </div>
                                <div onClick={() => startInspection('pc')} className="bg-tech-surface border border-gray-800 rounded-2xl p-6 flex flex-col items-center cursor-pointer hover:border-tech-secondary transition group">
                                    <i className="fa-solid fa-laptop text-4xl text-tech-secondary mb-3 group-hover:scale-110 transition-transform"></i>
                                    <h3 className="font-bold text-white">فحص حاسوب</h3>
                                </div>
                            </div>

                            <button onClick={() => setView('market')} className="w-full bg-gradient-to-r from-gray-800 to-gray-900 border border-gray-700 p-4 rounded-2xl flex items-center justify-between hover:border-yellow-500 transition">
                                <div className="flex items-center gap-3">
                                    <i className="fa-solid fa-user-secret text-2xl text-yellow-500"></i>
                                    <div className="text-right">
                                        <h3 className="font-bold text-white">أسرار السوق</h3>
                                        <p className="text-xs text-gray-400">كشف حقيقة الأسعار والأسواق الموازية</p>
                                    </div>
                                </div>
                                <i className="fa-solid fa-chevron-left text-gray-500"></i>
                            </button>
                        </div>
                    )}

                    {/* --- صفحة أسرار السوق --- */}
                    {view === 'market' && (
                        <div className="animate-slide-up space-y-6 mt-4">
                            <h2 className="text-2xl font-black text-white border-r-4 border-yellow-500 pr-3">كواليس السوق الأسود والرسمي</h2>
                            
                            {marketSecrets.map((secret, i) => (
                                <div key={i} className="bg-tech-surface border border-gray-800 p-5 rounded-2xl">
                                    <h3 className="font-bold text-tech-primary mb-4 text-lg">{secret.title}</h3>
                                    {secret.factory && (
                                        <div className="space-y-3 text-sm">
                                            <div className="flex justify-between items-center border-b border-gray-800 pb-2">
                                                <span className="text-gray-400"><i className="fa-solid fa-industry text-gray-500 ml-1"></i> المصنع</span>
                                                <span className="font-bold text-white">{secret.factory}</span>
                                            </div>
                                            <div className="flex justify-between items-center border-b border-gray-800 pb-2">
                                                <span className="text-gray-400"><i className="fa-solid fa-plane-departure text-gray-500 ml-1"></i> دبي/المهرب</span>
                                                <span className="font-bold text-yellow-500">{secret.dubai}</span>
                                            </div>
                                            <div className="flex justify-between items-center">
                                                <span className="text-gray-400"><i className="fa-solid fa-store text-gray-500 ml-1"></i> المتاجر الرسمية</span>
                                                <span className="font-bold text-red-400">{secret.official}</span>
                                            </div>
                                        </div>
                                    )}
                                    {secret.details && <p className="text-sm text-gray-300 leading-relaxed bg-gray-900 p-3 rounded-lg">{secret.details}</p>}
                                </div>
                            ))}
                        </div>
                    )}

                    {/* --- صفحة الفحص (Q&A) --- */}
                    {view === 'inspection' && (
                        <div className="h-full flex flex-col animate-fade-in mt-4">
                            <div className="w-full bg-gray-800 h-1.5 rounded-full mb-6">
                                <div className="bg-gradient-to-r from-tech-primary to-tech-secondary h-1.5 rounded-full transition-all duration-500" style={{ width: `${((currentStep + 1) / activeInspection.length) * 100}%` }}></div>
                            </div>
                            
                            <div className="bg-tech-surface border border-gray-800 rounded-3xl p-6 shadow-2xl relative">
                                <div className="flex flex-col items-center mb-6">
                                    <div className="w-16 h-16 bg-gray-900 rounded-full flex items-center justify-center text-3xl text-white mb-3 border border-gray-700 shadow-inner">
                                        <i className={`fa-solid ${activeInspection[currentStep].icon} text-transparent bg-clip-text bg-gradient-to-br from-tech-primary to-tech-secondary`}></i>
                                    </div>
                                    <h2 className="text-xl font-bold text-white text-center">{activeInspection[currentStep].title}</h2>
                                </div>

                                {!stepResult && (
                                    <div className="bg-blue-900/10 border border-blue-900/50 p-4 rounded-xl mb-6 animate-slide-up">
                                        <p className="text-blue-200 text-center font-bold text-sm leading-relaxed"><i className="fa-solid fa-circle-info ml-1"></i> {activeInspection[currentStep].instruction}</p>
                                    </div>
                                )}

                                {!stepResult ? (
                                    <div className="grid gap-3 animate-slide-up">
                                        {activeInspection[currentStep].options.map((opt, i) => (
                                            <button key={i} onClick={() => handleAnswer(opt)} className="w-full bg-gray-900 hover:bg-gray-800 text-white p-4 rounded-xl border border-gray-700 font-bold text-right flex justify-between items-center transition-all">
                                                <span>{opt.text}</span><i className="fa-solid fa-chevron-left text-gray-600"></i>
                                            </button>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="animate-fade-in text-center space-y-4">
                                        <div className={`w-16 h-16 mx-auto rounded-full flex items-center justify-center text-3xl mb-2 ${stepResult.status === 'good' ? 'bg-green-900/30 text-green-500' : 'bg-red-900/30 text-red-500'}`}>
                                            <i className={`fa-solid ${stepResult.status === 'good' ? 'fa-check' : 'fa-triangle-exclamation'}`}></i>
                                        </div>
                                        <h3 className={`text-xl font-black ${stepResult.status === 'good' ? 'text-green-400' : 'text-red-400'}`}>{stepResult.result}</h3>
                                        <p className="text-gray-300 text-sm bg-gray-900 p-3 rounded-lg border border-gray-800">{stepResult.advice}</p>

                                        <button onClick={nextStep} className="w-full bg-white text-black font-black py-3 rounded-xl shadow-lg hover:bg-gray-200 transition mt-4 flex items-center justify-center gap-2">
                                            {currentStep < activeInspection.length - 1 ? 'المرحلة التالية' : 'عرض التقرير النهائي'} <i className="fa-solid fa-arrow-left"></i>
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* --- التقرير النهائي --- */}
                    {view === 'report' && (
                        <div className="animate-fade-in space-y-6 mt-4">
                            <div className="text-center">
                                <h2 className="text-2xl font-black text-white">تقرير الفحص التقني 📋</h2>
                                <p className="text-gray-400 text-sm mt-1">نتيجة اختبار الـ {deviceType === 'pc' ? 'حاسوب' : 'هاتف'}</p>
                            </div>

                            {defects.length === 0 ? (
                                <div className="bg-green-900/20 border border-green-600/50 p-8 rounded-3xl text-center">
                                    <i className="fa-solid fa-award text-6xl text-green-500 mb-4"></i>
                                    <h3 className="text-2xl font-bold text-white mb-2">جهاز ممتاز (Clean)!</h3>
                                    <p className="text-green-200 text-sm">اجتاز جميع الاختبارات التقنية بنجاح (Hardware & Software). توكل على الله.</p>
                                </div>
                            ) : (
                                <div className="space-y-4">
                                    <div className="bg-red-900/20 border border-red-900/50 p-4 rounded-xl mb-4">
                                        <p className="text-red-400 font-bold text-center text-sm"><i className="fa-solid fa-triangle-exclamation"></i> تم رصد بعض المشاكل التقنية</p>
                                    </div>
                                    {defects.map((def, i) => (
                                        <div key={i} className="bg-tech-surface p-4 rounded-xl border-r-4 border-red-500 flex justify-between items-center shadow-md">
                                            <div>
                                                <h4 className="font-bold text-white text-sm">{def.title}</h4>
                                                <p className="text-xs text-red-400 mt-1">{def.result}</p>
                                            </div>
                                            <span className="font-black text-gray-300 text-sm bg-gray-800 px-2 py-1 rounded">خصم -{def.price}DH</span>
                                        </div>
                                    ))}
                                    <div className="bg-gradient-to-r from-gray-800 to-gray-900 p-5 rounded-2xl flex justify-between items-center border border-gray-700">
                                        <span className="text-gray-300 font-bold text-sm">قيمة التفاوض (نقص هاد الثمن):</span>
                                        <span className="text-2xl font-black text-white">{defects.reduce((a, b) => a + b.price, 0)} DH</span>
                                    </div>
                                </div>
                            )}
                            <button onClick={() => setView('home')} className="w-full border border-gray-700 text-gray-300 py-3 rounded-xl hover:bg-gray-800 transition font-bold">رجوع للرئيسية</button>
                        </div>
                    )}

                </main>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

</script>
</body>
</html>
